<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LinguaQuest ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ========================================
   LINGUAQUEST - THEME DARK MODERN
   ======================================== */

:root {
    /* Base colors - Dark Theme */
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-card: #1a1a24;
    --bg-elevated: #22222e;
    
    /* Accent colors */
    --pri: #8b7cf8;
    --pri-dark: #6d5dd6;
    --pri-light: #a99cf9;
    --mint: #55efc4;
    --mint-dark: #3bc9a4;
    --pink: #f06292;
    --pink-dark: #d84c7a;
    --yellow: #f9ca74;
    --red: #ff6b6b;
    --orange: #ffa502;
    
    /* Text colors */
    --text-primary: #f0f0f5;
    --text-secondary: #a0a0b0;
    --text-muted: #6a6a7a;
    
    /* Borders */
    --border: #2a2a35;
    --border-light: #353540;
    
    /* Shadows */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
    --glow-pri: 0 0 20px rgba(139, 124, 248, 0.3);
    --glow-mint: 0 0 20px rgba(85, 239, 196, 0.3);
    
    /* Radius */
    --rxs: 8px;
    --rsm: 12px;
    --rmd: 16px;
    --rlg: 24px;
    --rfull: 9999px;
    
    /* Transitions */
    --t-fast: 0.2s ease;
    --t-normal: 0.3s ease;
    --t-slow: 0.5s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
}

/* ========================================
   SCREENS
   ======================================== */
.screen {
    display: none;
    min-height: 100vh;
    animation: fadeIn 0.4s ease;
}

.screen.active {
    display: flex;
    flex-direction: column;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ========================================
   HEADER
   ======================================== */
.hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
}

.logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--pri), var(--mint));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.back, .ico-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rfull);
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: var(--t-fast);
}

.back:hover, .ico-btn:hover {
    background: var(--pri);
    border-color: var(--pri);
    transform: scale(1.05);
}

/* ========================================
   BUTTONS
   ======================================== */
.btn {
    padding: 14px 24px;
    border: none;
    border-radius: var(--rmd);
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--t-normal);
    font-family: 'Nunito', sans-serif;
    width: 100%;
    text-align: center;
}

.btn-p {
    background: linear-gradient(135deg, var(--pri), var(--pri-dark));
    color: white;
    box-shadow: var(--shadow-sm);
}

.btn-p:hover {
    transform: translateY(-2px);
    box-shadow: var(--glow-pri);
}

.btn-s {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
}

.btn-s:hover {
    background: var(--bg-elevated);
    border-color: var(--pri);
    color: var(--pri);
}

.btn-g {
    background: linear-gradient(135deg, var(--mint), var(--mint-dark));
    color: var(--bg-primary);
}

.btn-red {
    background: linear-gradient(135deg, var(--red), #e55);
    color: white;
}

.btn-pink {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: white;
}

/* ========================================
   SCROLL AREA
   ======================================== */
.sb {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* ========================================
   MASCOT
   ======================================== */
.mascot {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-card);
    border-radius: var(--rlg);
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
}

.em {
    font-size: 52px;
    min-width: 70px;
    text-align: center;
}

.bubble {
    flex: 1;
    background: var(--bg-elevated);
    padding: 12px 16px;
    border-radius: var(--rmd);
    font-weight: 600;
    color: var(--text-secondary);
    position: relative;
}

.bubble::before {
    content: '';
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%);
    border: 8px solid transparent;
    border-right-color: var(--bg-elevated);
}

/* Mascot animations */
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

@keyframes dance {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-10deg); }
    75% { transform: rotate(10deg); }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

@keyframes sad {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
}

@keyframes sleep {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(5deg); }
}

.em.bounce { animation: bounce 0.6s ease infinite; }
.em.dance { animation: dance 0.5s ease infinite; }
.em.pulse { animation: pulse 0.4s ease infinite; }
.em.sad { animation: sad 1s ease infinite; }
.em.sleep { animation: sleep 2s ease infinite; }

/* ========================================
   EXERCISE CARD
   ======================================== */
.ex-card, .audio-card {
    background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
    border-radius: var(--rlg);
    padding: 24px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid var(--border);
}

.ex-tag, .audio-tag {
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--pri);
    margin-bottom: 12px;
}

.ex-phrase {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.3;
    color: var(--text-primary);
}

.ex-hint, .audio-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 12px;
}

.spk-btn {
    width: 64px;
    height: 64px;
    border-radius: var(--rfull);
    background: var(--pri);
    border: none;
    font-size: 2rem;
    cursor: pointer;
    margin: 12px auto;
    transition: var(--t-fast);
    box-shadow: var(--shadow-sm);
}

.spk-btn:hover {
    transform: scale(1.05);
    box-shadow: var(--glow-pri);
}

.reveal-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: var(--rfull);
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    margin-top: 12px;
}

.revealed-t {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--mint);
    margin: 12px 0;
}

/* ========================================
   DOTS (progress indicators)
   ======================================== */
.dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: var(--rfull);
    background: var(--border);
    transition: var(--t-fast);
}

.dot.done {
    background: var(--mint);
}

.dot.cur {
    background: var(--pri);
    transform: scale(1.3);
    box-shadow: var(--glow-pri);
}

/* ========================================
   CHAT TEXTAREA
   ======================================== */
.ans-lbl {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-muted);
}

.chat-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

.chat-ta {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rmd);
    padding: 12px 16px;
    font-family: 'Nunito', monospace;
    font-size: 1rem;
    color: var(--text-primary);
    resize: none;
    min-height: 56px;
    transition: var(--t-fast);
}

.chat-ta:focus {
    outline: none;
    border-color: var(--pri);
    box-shadow: var(--glow-pri);
}

.chat-send {
    width: 48px;
    height: 48px;
    border-radius: var(--rmd);
    background: var(--pri);
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    transition: var(--t-fast);
}

.chat-send:hover {
    transform: scale(1.05);
    background: var(--pri-light);
}

.ex-meta {
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
}

/* ========================================
   LEVEL COMPLETE SCREEN
   ======================================== */
.cmp-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
}

.cmp-title {
    font-size: 1.8rem;
    font-weight: 800;
    margin: 16px 0 8px;
    background: linear-gradient(135deg, var(--mint), var(--pri));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.cmp-sub {
    color: var(--text-muted);
    font-weight: 600;
}

.sgrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 320px;
    margin: 24px 0;
}

.sc {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rmd);
    padding: 16px;
}

.sv {
    display: block;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--pri);
}

.sl {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
}

.final-em {
    font-size: 64px;
    margin-bottom: 16px;
}

.final-msg {
    color: var(--text-secondary);
    max-width: 280px;
    margin: 8px 0;
}

.time-table {
    background: var(--bg-card);
    border-radius: var(--rmd);
    padding: 12px;
    margin: 12px 0;
}

.time-table-h {
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 0.8rem;
    color: var(--pri);
}

.time-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.8rem;
    border-bottom: 1px solid var(--border);
}

.time-row:last-child {
    border-bottom: none;
}

/* ========================================
   SETUP SCREEN
   ======================================== */
.setup-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
}

.setup-h {
    font-size: 1.3rem;
    font-weight: 800;
    text-align: center;
}

.setup-sub {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
}

.json-ta {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rmd);
    padding: 14px;
    font-family: 'Nunito', monospace;
    font-size: 0.85rem;
    color: var(--text-primary);
    resize: vertical;
    min-height: 140px;
}

.json-ta:focus {
    outline: none;
    border-color: var(--pri);
}

/* ========================================
   INFO CARD
   ======================================== */
.info-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rmd);
    padding: 12px;
    display: none;
}

.info-card.show {
    display: block;
}

.info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.85rem;
}

.info-v {
    font-weight: 800;
    color: var(--pri);
}

.err {
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid var(--red);
    border-radius: var(--rxs);
    padding: 10px;
    font-size: 0.8rem;
    color: var(--red);
    display: none;
}

.err.show {
    display: block;
}

/* ========================================
   MODAL
   ======================================== */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
}

#overlay.show {
    display: block;
}

#modal {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-secondary);
    border-radius: var(--rlg) var(--rlg) 0 0;
    z-index: 101;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
}

#modal.show {
    transform: translateY(0);
}

.mpill {
    width: 50px;
    height: 4px;
    background: var(--border);
    border-radius: var(--rfull);
    margin: 12px auto;
}

.mtitle {
    font-size: 1.3rem;
    font-weight: 800;
    text-align: center;
    padding: 8px 20px;
}

.msec {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 16px 20px 8px;
}

.mact {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: var(--t-fast);
    text-align: left;
}

.mact:hover {
    background: var(--bg-card);
}

.mact-ic {
    font-size: 1.4rem;
    min-width: 36px;
}

.mact-t {
    flex: 1;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-primary);
}

.mact-sub {
    display: block;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-muted);
}

.tbadge {
    font-size: 0.7rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: var(--rfull);
}

.tbadge.on {
    background: var(--mint);
    color: var(--bg-primary);
}

.tbadge.off {
    background: var(--bg-elevated);
    color: var(--text-muted);
}

.mact.danger .mact-t {
    color: var(--red);
}

.stats-list {
    padding: 0 20px;
}

.st-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
}

.st-total {
    display: flex;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--bg-card);
    margin-bottom: 16px;
    font-weight: 800;
}

/* ========================================
   MAP SCREEN - REDESIGNED
   ======================================== */
.map-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
}

.map-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 6px;
}

.map-logo-icon {
    font-size: 1.5rem;
}

.map-settings {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rfull);
    width: 40px;
    height: 40px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: var(--t-fast);
}

.map-settings:hover {
    background: var(--pri);
    transform: rotate(30deg);
}

.map-mascot-card {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px;
    padding: 12px 16px;
    background: var(--bg-card);
    border-radius: var(--rlg);
    border: 1px solid var(--border);
}

.map-mascot-emoji {
    font-size: 48px;
    min-width: 60px;
    text-align: center;
}

.map-mascot-bubble {
    flex: 1;
    background: var(--bg-elevated);
    padding: 10px 14px;
    border-radius: var(--rmd);
    display: flex;
    align-items: center;
    gap: 8px;
}

.map-mascot-text {
    flex: 1;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.map-mascot-emoji-small {
    font-size: 1.2rem;
}

.map-emotional-msg {
    text-align: center;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--pri);
    margin: 0 20px 16px;
    padding: 8px;
    background: rgba(139, 124, 248, 0.1);
    border-radius: var(--rfull);
}

.map-progress {
    margin: 0 20px 24px;
}

.map-progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.75rem;
    font-weight: 700;
}

.map-progress-label {
    color: var(--text-muted);
}

.map-progress-value {
    color: var(--pri);
}

.map-progress-bar {
    height: 8px;
    background: var(--bg-card);
    border-radius: var(--rfull);
    overflow: hidden;
}

.map-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pri), var(--mint));
    border-radius: var(--rfull);
    position: relative;
    transition: width 0.5s ease;
}

.map-progress-glint {
    position: absolute;
    top: 0;
    right: 0;
    width: 20px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: glint 2s infinite;
}

@keyframes glint {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
}

.map-path-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.map-path {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
}

.map-node {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--rmd);
    padding: 14px 18px;
    width: 100%;
    max-width: 320px;
    cursor: pointer;
    transition: var(--t-normal);
    position: relative;
    animation: nodeSlideIn 0.4s ease backwards;
}

@keyframes nodeSlideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.map-node:hover {
    transform: translateX(5px);
    border-color: var(--pri);
}

.map-node.done {
    background: linear-gradient(135deg, rgba(85, 239, 196, 0.1), var(--bg-card));
    border-color: var(--mint);
}

.map-node.active {
    border-color: var(--pri);
    box-shadow: var(--glow-pri);
    transform: scale(1.02);
}

.map-node.locked {
    opacity: 0.6;
    cursor: not-allowed;
}

.map-node.locked:hover {
    transform: none;
}

.map-node-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--rmd);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(139, 124, 248, 0.1);
    border: 1px solid var(--pri);
}

.map-node-emoji {
    font-size: 1.5rem;
}

.map-node-content {
    flex: 1;
}

.map-node-title {
    font-weight: 800;
    font-size: 1rem;
    margin-bottom: 4px;
}

.map-node-subtitle {
    font-size: 0.7rem;
    color: var(--text-muted);
}

.map-node-arrow {
    font-size: 1.2rem;
    color: var(--text-muted);
}

.map-connector {
    width: 2px;
    height: 24px;
    background: var(--border);
    margin: 4px 0;
}

.map-connector.done {
    background: linear-gradient(180deg, var(--mint), var(--pri));
}

/* ========================================
   CONFETTI
   ======================================== */
#ck {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 200;
    overflow: hidden;
}

.cp {
    position: absolute;
    animation: fall linear forwards;
}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

/* ========================================
   TOAST
   ======================================== */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-elevated);
    color: white;

<body>
<div id="app"></div>
<div id="ck"></div>
<div id="toast"></div>
<div id="overlay" onclick="closeModal()"></div>
<div id="modal"></div>

<script>
// ════ STATE ════
const SK = 'lq_v5';
function defS() {
    return {
        exercises: [], levels: [], responses: {},
        currentLevel: 0, currentExInLevel: 0,
        levelTimes: {}, totalMs: 0,
        dailyCount: 0, dailyDate: null,
        totalHistorical: 0, lastActivity: null,
        audioMode: false
    };
}
let S = defS(), lastMsg = -1;

const MSGS = ['¡Vas increíble! 🔥', 'Ya estás dominando esto 💪', '¡No te rindas! 😄',
    'Tu inglés está mejorando mucho ✨', '¡Un ejercicio más! 💪', 'Excelente consistencia 🌟',
    '¡Eso es! ¡Sigue así! 🎯', 'Cada respuesta te hace más fluido 🌊',
    '¡Eres imparable! ⚡', 'Tu esfuerzo vale la pena 💎', '¡Fantástico! 🚀',
    '¡Sigue brillando! 🌈', 'Tu cerebro lo está asimilando 🧠',
];
const MASCOTS = {
    idle: { e: '😊', a: '', m: '¡Listo para estudiar! 🚀' },
    happy: { e: '😄', a: 'bounce', m: '¡Excelente trabajo! 👏' },
    cool: { e: '😎', a: '', m: '¡Qué bien estás progresando!' },
    sad: { e: '😢', a: 'sad', m: 'Te extrañé... ¡Vuelve a estudiar!' },
    sleep: { e: '😴', a: 'sleep', m: 'Zzz... despiértame cuando estudies!' },
    party: { e: '🥳', a: 'dance', m: '¡Meta cumplida! 🎉' },
    push: { e: '💪', a: 'pulse', m: '¡Tú puedes! ¡Sigue adelante!' },
};

// ════ STORAGE ════
function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e) { } }
function load() { try { const r = localStorage.getItem(SK); if (r) S = { ...defS(), ...JSON.parse(r) }; } catch (e) { S = defS(); } }

// ════ LEVELS ════
function buildLevels(arr) { const r = []; for (let i = 0; i < arr.length; i += 3) r.push(arr.slice(i, i + 3).map((_, j) => i + j)); return r; }
function lvlDone(li) { return S.levels[li]?.every(i => S.responses[i] !== undefined) ?? false; }
function totalDone() { return Object.keys(S.responses).length; }
function allExDone() { return S.exercises.length > 0 && totalDone() >= S.exercises.length; }

// ════ MAP NODES ════
function buildNodes() {
    const nodes = [];
    for (let li = 0; li < S.levels.length; li++) {
        nodes.push({ type: 'ex', li: li });
    }
    return nodes;
}

function nodeDone(n) {
    if (n.type === 'ex') return lvlDone(n.li);
    return false;
}

function nodeOpen(ni, nodes) { return ni === 0 || nodeDone(nodes[ni - 1]); }

function activeNodeIdx(nodes) {
    for (let i = 0; i < nodes.length; i++) if (!nodeDone(nodes[i]) && nodeOpen(i, nodes)) return i;
    return Math.max(0, nodes.length - 1);
}

// ════ MASCOT ════
function getMascot() {
    const last = S.lastActivity, now = Date.now();
    if (last) { const d = (now - last) / 60000; if (d > 180) return MASCOTS.sleep; if (d > 60) return MASCOTS.sad; }
    const nodes = buildNodes();
    if (nodes.every(n => nodeDone(n)) && nodes.length > 0) return MASCOTS.party;
    if (totalDone() === 0) return MASCOTS.idle;
    return totalDone() < 5 ? MASCOTS.push : MASCOTS.happy;
}
function randMsg() {
    let i; do { i = Math.floor(Math.random() * MSGS.length); } while (i === lastMsg && MSGS.length > 1);
    lastMsg = i; return MSGS[i];
}

// ════ TIME ════
function fmtMs(ms) {
    if (!ms || ms < 0) return '—';
    if (ms < 60000) return Math.round(ms / 1000) + 's';
    return Math.floor(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
}
function fmtAvg(ms, n) { return (!n || !ms) ? '—' : fmtMs(ms / n); }

// ════ SOUND / CONFETTI / TOAST / HELPERS ════
const CC = ['#8b7cf8', '#f06292', '#f9ca74', '#55efc4', '#74b9ff', '#fd79a8', '#a29bfe'];
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function norm(s) { return (s || '').toLowerCase().trim().replace(/\s+/g, ' '); }

let toastT;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2700);
}

function confetti(n) {
    const ck = document.getElementById('ck'); ck.innerHTML = '';
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div'); p.className = 'cp';
        p.style.left = Math.random() * 100 + '%'; p.style.top = '-15px';
        p.style.background = CC[Math.floor(Math.random() * CC.length)];
        const sz = 7 + Math.random() * 10; p.style.width = sz + 'px'; p.style.height = sz + 'px';
        p.style.borderRadius = Math.random() > .5 ? '50%' : '3px';
        p.style.animationDuration = (1.6 + Math.random() * 2) + 's';
        p.style.animationDelay = (Math.random() * .8) + 's';
        ck.appendChild(p);
    }
    setTimeout(() => ck.innerHTML = '', 4800);
}

// ════ SOUND EFFECTS ════
function playPing() {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 880;
        gainNode.gain.value = 0.2;
        
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
        oscillator.stop(audioContext.currentTime + 0.3);
        
        setTimeout(() => audioContext.close(), 500);
    } catch (e) {}
}

// ════ TIMERS FOR EXERCISES ════
let lvlStart = null, exStart = null;
// ════ MODAL ════
function openModal(html) {
    document.getElementById('modal').innerHTML = html;
    document.getElementById('modal').classList.add('show');
    document.getElementById('overlay').classList.add('show');
}
function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
}
function openOptions() {
    const done = totalDone(), tot = S.exercises.length;
    openModal(`
<div class="mpill"></div><div class="mtitle">⚙️ Opciones</div>
<div class="msec">MODO DE PRÁCTICA</div>
<button class="mact ${S.audioMode ? 'ton' : ''}" onclick="toggleAudio()">
  <span class="mact-ic">${S.audioMode ? '🔊' : '📝'}</span>
  <span class="mact-t">Modo audio<span class="mact-sub">Escucha la frase en vez de leerla</span></span>
  <span class="tbadge ${S.audioMode ? 'on' : 'off'}">${S.audioMode ? 'ON' : 'OFF'}</span>
</button>
<div class="msec">PROGRESO</div>
${done > 0 ? `<button class="mact acc" onclick="closeModal();copyPartial()">
  <span class="mact-ic">📋</span>
  <span class="mact-t">Copiar avances<span class="mact-sub">${done} de ${tot} respuestas</span></span>
</button>` : ''}
<button class="mact sc" onclick="closeModal();openAddModal()">
  <span class="mact-ic">➕</span>
  <span class="mact-t">Agregar ejercicios<span class="mact-sub">Concatenar sin perder progreso</span></span>
</button>
<button class="mact" onclick="closeModal();openStats()">
  <span class="mact-ic">📊</span>
  <span class="mact-t">Estadísticas<span class="mact-sub">Tiempo por nivel y totales</span></span>
</button>
<div class="msec">ZONA PELIGROSA</div>
<button class="mact danger" onclick="confirmReset()">
  <span class="mact-ic">🔄</span>
  <span class="mact-t">Reiniciar progreso<span class="mact-sub">Borra respuestas y estadísticas</span></span>
</button>
<button class="mact danger" onclick="confirmClear()">
  <span class="mact-ic">🗑️</span>
  <span class="mact-t">Cargar nuevos ejercicios<span class="mact-sub">Reemplaza todo</span></span>
</button>
<div class="msec">Versión 1.0.3</div>
`);
}
function toggleAudio() {
    S.audioMode = !S.audioMode; save(); closeModal();
    toast(S.audioMode ? '🔊 Modo audio activado' : '📝 Modo texto activado');
    if (document.getElementById('scr-ex')) renderExercise();
}
function confirmReset() {
    openModal(`<div class="mpill"></div><div class="mtitle">⚠️ ¿Reiniciar progreso?</div><p style="text-align:center;color:var(--muted);font-size:14px;font-weight:600;margin-bottom:18px">Se borrarán respuestas y estadísticas.</p><button class="btn btn-red" style="margin-bottom:9px" onclick="doReset()">🔄 Sí, reiniciar</button><button class="btn btn-s" onclick="openOptions()">← Cancelar</button>`);
}
function doReset() {
    const ex = S.exercises, lv = S.levels, am = S.audioMode;
    S = defS(); 
    S.exercises = ex; 
    S.levels = lv; 
    S.audioMode = am;
    save(); 
    closeModal(); 
    toast('🔄 Progreso reiniciado');
    setTimeout(() => renderMap(), 400);
}
function confirmClear() {
    openModal(`<div class="mpill"></div><div class="mtitle">⚠️ ¿Cargar nuevos ejercicios?</div><p style="text-align:center;color:var(--muted);font-size:14px;font-weight:600;margin-bottom:18px">Se reemplazará todo el contenido.</p><button class="btn btn-red" style="margin-bottom:9px" onclick="doClear()">🗑️ Sí, reemplazar</button><button class="btn btn-s" onclick="openOptions()">← Cancelar</button>`);
}
function doClear() { 
    S = defS(); 
    save(); 
    closeModal(); 
    renderSetup(); 
}
function openStats() {
    const done = totalDone(), tot = S.exercises.length;
    let exRows = '';
    S.levels.forEach((ea, li) => {
        const t = S.levelTimes[li], c = ea.filter(i => S.responses[i] !== undefined).length;
        const ic = lvlDone(li) ? '✅' : c > 0 ? '🔄' : '🔒';
        exRows += `<div class="st-row"><span class="st-l">${ic} Nivel ${li + 1} (${c}/${ea.length})</span><span class="st-r">${t ? fmtMs(t) : '—'}</span></div>`;
    });
    openModal(`
<div class="mpill"></div><div class="mtitle">📊 Estadísticas</div>
<div class="st-total"><span class="st-l">⏱ Tiempo total</span><span class="st-r">${fmtMs(S.totalMs)}</span></div>
<div style="display:flex;gap:8px;margin-bottom:12px">
  <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rxs);padding:10px;text-align:center">
    <div style="font-size:17px;font-weight:900;color:var(--mint)">${done}/${tot}</div>
    <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px">Traducción</div>
  </div>
  <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rxs);padding:10px;text-align:center">
    <div style="font-size:17px;font-weight:900;color:var(--pri)">${fmtAvg(S.totalMs, done)}</div>
    <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-top:2px">Prom/ejercicio</div>
  </div>
</div>
${exRows ? `<div class="msec">NIVELES DE TRADUCCIÓN</div><div class="stats-list">${exRows}</div>` : ''}
<button class="btn btn-s" style="margin-top:13px" onclick="closeModal()">Cerrar</button>
`);
}
function openAddModal() {
    openModal(`<div class="mpill"></div><div class="mtitle">➕ Agregar ejercicios</div>
<p style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:11px;text-align:center">Se concatenarán al final sin afectar el progreso</p>
<textarea class="json-ta" id="add-json" placeholder='["Nueva frase 1","Nueva frase 2"]' oninput="prevAdd()" style="min-height:110px;margin-bottom:9px"></textarea>
<div class="err" id="add-err"></div>
<div class="info-card" id="add-prev" style="margin-bottom:9px"></div>
<button class="btn btn-g" style="margin-bottom:8px" onclick="doAdd()">➕ Agregar</button>
<button class="btn btn-s" onclick="closeModal()">Cancelar</button>`);
}
function prevAdd() {
    const v = (document.getElementById('add-json') || {}).value || '';
    const pv = document.getElementById('add-prev'), er = document.getElementById('add-err');
    if (!v.trim()) { pv?.classList.remove('show'); er?.classList.remove('show'); return; }
    try {
        const p = JSON.parse(v);
        if (!Array.isArray(p) || p.length === 0) throw new Error('Debe ser un array no vacío');
        if (pv) {
            pv.innerHTML = `<div class="info-row"><span>📚 Nuevos</span><span class="info-v">+${p.length}</span></div><div class="info-row"><span>🎯 Total resultante</span><span class="info-v">${S.exercises.length + p.length}</span></div>`;
            pv.classList.add('show');
        }
        if (er) er.classList.remove('show');

function buildText(partial) {
    let txt = '';
    S.exercises.forEach((ph, i) => {
        const r = S.responses[i];
        if (partial && r === undefined) return;
        txt += `${i + 1}. ${ph}\nMi respuesta: ${r || '(sin respuesta)'}\n\n`;
    });
    if (!partial) {
        txt += `\n--- Estadísticas ---\nTiempo total: ${fmtMs(S.totalMs)}\nEjercicios: ${totalDone()} / ${S.exercises.length}\nTotal histórico: ${S.totalHistorical || 0}\n\n`;
        S.levels.forEach((ea, li) => { const t = S.levelTimes[li]; if (t) txt += `Nivel ${li + 1}: ${fmtMs(t)}\n`; });
    }
    return txt.trim();
}
function clip(txt, msg) {
    navigator.clipboard?.writeText(txt).then(() => toast(msg)).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); toast(msg);
    });
}
function copyPartial() { const txt = buildText(true); if (!txt) { toast('⚠️ No hay respuestas aún'); return; } clip(txt, `✅ ${totalDone()} respuestas copiadas`); }

function startExercise(li, ni) {
    S.currentLevel = li;

    for (let i = 0; i < ea.length; i++) {

}

function saveAns() {
    const inp = document.getElementById('ans');
    const ans = (inp?.value || '').trim();
    if (!ans) {
        toast('✏️ Escribe tu respuesta primero');
        inp?.focus();
        return;
    }
    
    const li = S.currentLevel, ea = S.levels[li], ei = S.currentExInLevel, gi = ea[ei];
    const isNew = S.responses[gi] === undefined;
    
    S.responses[gi] = ans;
    S.lastActivity = Date.now();
    
    if (isNew) {
        S.dailyCount = (S.dailyCount || 0) + 1;
        S.totalHistorical = (S.totalHistorical || 0) + 1;
        if (exStart) S.totalMs = (S.totalMs || 0) + (Date.now() - exStart);
    }
    exStart = Date.now();
    if (navigator.vibrate) navigator.vibrate(40);
    playPing();
    save();
    
    const done_ = ea.every(i => S.responses[i] !== undefined);
    if (done_) {
        if (lvlStart) S.levelTimes[li] = Date.now() - lvlStart;
        save();
        toast(randMsg());
        setTimeout(() => renderLvlComplete(li, true), 620);
    } else {
        let next = ei + 1;
        while (next < ea.length && S.responses[ea[next]] !== undefined) next++;
        S.currentExInLevel = next < ea.length ? next : ei;
        save();
        toast(randMsg());
        setTimeout(() => renderExercise(), 500);
    }
}

    if (stopBtn) stopBtn.onclick = stopRecording;

    const deleteBtn = document.getElementById('delete-story-btn');
    if (deleteBtn) deleteBtn.onclick = deleteStory;

    initSpeechRecognition();
}

// ========== TEXT PROCESSING ==========
function processStoryText(text) {
    const cleanText = text.trim();

    const originalTokens = [];
    const normalizedTokens = [];

    let currentWord = '';
    let currentPunctuation = '';

    for (let i = 0; i < cleanText.length; i++) {
        const char = cleanText[i];

        if (char === ' ') {
            if (currentWord) {
                originalTokens.push(currentWord);
                normalizedTokens.push(currentWord.toLowerCase());
                currentWord = '';
            }
            if (currentPunctuation) {
                originalTokens.push(currentPunctuation);
                normalizedTokens.push(currentPunctuation);
                currentPunctuation = '';
            }
            originalTokens.push(' ');
            normalizedTokens.push(' ');
        } else if (char.match(/[.,!?;:()"']/)) {
            if (currentWord) {
                originalTokens.push(currentWord);
                normalizedTokens.push(currentWord.toLowerCase());
                currentWord = '';
            }
            currentPunctuation += char;
        } else {
            if (currentPunctuation) {
                originalTokens.push(currentPunctuation);
                normalizedTokens.push(currentPunctuation);
                currentPunctuation = '';
            }
            currentWord += char;
        }
    }

    if (currentWord) {
        originalTokens.push(currentWord);
        normalizedTokens.push(currentWord.toLowerCase());
    }
    if (currentPunctuation) {
        originalTokens.push(currentPunctuation);
        normalizedTokens.push(currentPunctuation);
    }

    return { tokens: normalizedTokens, originalTokens: originalTokens };
}

function renderHighlightedText() {
    const container = document.getElementById('story-text');
    if (!container || !storyOriginalTokens) return;

    let html = '';
    let currentWordIndex = 0;

    for (let i = 0; i < storyOriginalTokens.length; i++) {
        const token = storyOriginalTokens[i];

        if (token === ' ') {
            html += ' ';
            continue;
        }

        const isPunctuation = token.match(/^[.,!?;:()"']+$/);

        if (isPunctuation) {
            html += `<span class="punctuation">${escapeHtml(token)}</span>`;
        } else {
            const isMatched = matchedWordsSet.has(currentWordIndex);
            const isSelected = isWordInSelectedPhrases(token);

            let classes = [];
            if (isMatched) classes.push('story-word-matched');
            if (isSelected) classes.push('story-word-selected');

            const classAttr = classes.length ? ` class="${classes.join(' ')}"` : '';
            html += `<span data-word="${escapeHtml(token.toLowerCase())}" data-idx="${currentWordIndex}"${classAttr}>${escapeHtml(token)}</span>`;
            currentWordIndex++;
        }
    }

    container.innerHTML = html;
    attachTouchEvents();
}

function isWordInSelectedPhrases(word) {
    const lowerWord = word.toLowerCase().replace(/[.,!?;:()"']/g, '');
    return selectedPhrases.some(phrase => {
        const phraseLower = phrase.toLowerCase();
        const wordsInPhrase = phraseLower.split(/\s+/);
        return wordsInPhrase.includes(lowerWord);
    });
}

function groupContiguousWords(words) {
    if (words.length === 0) return [];

    // Obtener las posiciones de cada palabra en el texto original
    const wordPositions = [];

    for (let i = 0; i < storyOriginalTokens.length; i++) {
        const token = storyOriginalTokens[i];
        if (token !== ' ' && !token.match(/^[.,!?;:()"']+$/)) {
            const normalizedToken = token.toLowerCase();
            if (words.includes(normalizedToken)) {
                wordPositions.push({
                    word: normalizedToken,
                    index: i,
                    original: token
                });
            }
        }
    }

    // Ordenar por índice de aparición en el texto
    wordPositions.sort((a, b) => a.index - b.index);

    // Agrupar palabras contiguas (diferencia de índice === 1)
    const phrases = [];
    let currentPhrase = [];
    let lastIndex = -1;

    for (let i = 0; i < wordPositions.length; i++) {
        const pos = wordPositions[i];

        if (lastIndex === -1) {
            currentPhrase.push(pos.original);
        } else if (pos.index === lastIndex + 1) {
            currentPhrase.push(pos.original);
        } else {
            if (currentPhrase.length > 0) {
                phrases.push(currentPhrase.join(' '));
            }
            currentPhrase = [pos.original];
        }
        lastIndex = pos.index;
    }

    if (currentPhrase.length > 0) {
        phrases.push(currentPhrase.join(' '));
    }

    return phrases;
}
function attachTouchEvents() {
    const container = document.getElementById('story-text');
    if (!container) return;

    container.style.userSelect = 'none';
    container.style.webkitUserSelect = 'none';

    // Set global para acumular clicks — se limpia al hacer commit
    if (!window._storySelecting) window._storySelecting = new Set();
    const sel = window._storySelecting;

    // ---- TOUCH: arrastre ----
    container.addEventListener('touchstart', (e) => {
        sel.clear();
        container.querySelectorAll('.temp-selected').forEach(el => el.classList.remove('temp-selected'));
        const target = e.target.closest('[data-idx]');
        if (target) {
            const idx = parseInt(target.dataset.idx);
            if (!isNaN(idx)) { sel.add(idx); highlightTempWord(target, true); }
        }
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY)?.closest('[data-idx]');
        if (el) {
            const idx = parseInt(el.dataset.idx);
            if (!isNaN(idx) && !sel.has(idx)) { sel.add(idx); highlightTempWord(el, true); }
        }
    }, { passive: false });

    container.addEventListener('touchend', () => {
        _commitSelection(sel);
        container.querySelectorAll('.temp-selected').forEach(el => el.classList.remove('temp-selected'));
        sel.clear();
    }, { passive: true });

    // ---- MOUSE: click acumulativo ----
    container.addEventListener('click', (e) => {
        const target = e.target.closest('[data-idx]');
        if (!target) return;
        const idx = parseInt(target.dataset.idx);
        if (isNaN(idx)) return;

        if (sel.has(idx)) {
            sel.delete(idx);
            target.classList.remove('temp-selected');
        } else {
            sel.add(idx);
            target.classList.add('temp-selected');
        }

        // Reiniciar timer de auto-commit
        if (window._commitTimer) clearTimeout(window._commitTimer);
        window._commitTimer = setTimeout(() => {
            if (sel.size > 0) {
                _commitSelection(sel);
                container.querySelectorAll('.temp-selected').forEach(el => el.classList.remove('temp-selected'));
                sel.clear();
            }
            window._commitTimer = null;
        }, 1000);
    });

    // Click fuera = commit inmediato
    document.addEventListener('click', (e) => {
        if (!container.contains(e.target) && sel.size > 0) {
            if (window._commitTimer) { clearTimeout(window._commitTimer); window._commitTimer = null; }
            _commitSelection(sel);
            container.querySelectorAll('.temp-selected').forEach(el => el.classList.remove('temp-selected'));
            sel.clear();
        }
    });
}

function _commitSelection(indicesSet) {
    if (indicesSet.size === 0) return;

    const indicesArray = Array.from(indicesSet);
    console.log('=== _commitSelection ===');
    console.log('índices recibidos:', indicesArray);
    console.log('cantidad de índices:', indicesArray.length);

    const phrases = groupContiguousIndices(indicesArray);
    console.log('frases resultantes:', phrases);

    phrases.forEach(phrase => {
        if (phrase && !selectedPhrases.includes(phrase)) {
            selectedPhrases.unshift(phrase);
            if (selectedPhrases.length > 15) selectedPhrases.pop();
        }
    });
    renderSelectedChips();
    renderHighlightedText();
}

function groupContiguousIndices(wordIndices) {
    if (wordIndices.length === 0) return [];

    const sorted = [...wordIndices].sort((a, b) => a - b);
    const phrases = [];
    let currentGroup = [sorted[0]];

    for (let i = 1; i < sorted.length; i++) {
        if (sorted[i] === sorted[i - 1] + 1) {
            // Contiguas: mismo grupo
            currentGroup.push(sorted[i]);
        } else {
            phrases.push(_indicesToPhrase(currentGroup));
            currentGroup = [sorted[i]];
        }
    }
    phrases.push(_indicesToPhrase(currentGroup));

    return phrases.filter(Boolean);
}

// Convierte un array de word-indices en el texto original correspondiente
function _indicesToPhrase(indices) {
    const words = indices.map(wordIdx => {
        // Recorre storyOriginalTokens contando solo palabras reales
        let count = 0;
        for (let t = 0; t < storyOriginalTokens.length; t++) {
            const tok = storyOriginalTokens[t];
            if (tok !== ' ' && !tok.match(/^[.,!?;:()"']+$/)) {
                if (count === wordIdx) return tok;
                count++;
            }
        }
        return null;
    });
    return words.filter(Boolean).join(' ');
}

// Helper: dado un word-index, devuelve el token-index correspondiente en storyOriginalTokens
function getTokenIndexForWordIndex(wordIndex) {
    let wordCount = 0;
    for (let i = 0; i < storyOriginalTokens.length; i++) {
        const token = storyOriginalTokens[i];
        if (token !== ' ' && !token.match(/^[.,!?;:()"']+$/)) {
            if (wordCount === wordIndex) return i;
            wordCount++;
        }
    }
    return -1;
}

function highlightTempWord(element, add) {
    if (add) {
        element.classList.add('temp-selected');
    } else {
        element.classList.remove('temp-selected');
    }
}

function renderSelectedChips() {
    const wrapper = document.getElementById('chips-wrapper');
    if (!wrapper) return;

    if (selectedPhrases.length === 0) {
        wrapper.innerHTML = '<span class="chips-empty">Selecciona palabras en el texto</span>';
        return;
    }

    const chipsHtml = selectedPhrases.map((phrase, idx) => `
        <button class="chip" data-phrase="${escapeHtml(phrase)}" onclick="speakSelectedPhrase('${escapeHtml(phrase)}')">
            🔊 ${escapeHtml(phrase)}
        </button>
    `).join('');

    wrapper.innerHTML = chipsHtml;
}

// ========== STORAGE ==========
function loadSavedStory() {
    const saved = S.storyData;
    if (saved && saved.text) {
        storyText = saved.text;
        matchedWordsSet = new Set(saved.matchedIndices || []);
        loadStoryIntoView();
    }
}

function saveStoryToStorage() {
    if (!S.storyData) S.storyData = {};
    S.storyData.text = storyText;
    S.storyData.matchedIndices = Array.from(matchedWordsSet);
    save();
}

function saveNewStory() {
    const input = document.getElementById('story-input');
    const newText = input?.value.trim();

    if (!newText) {
        toast('📝 Por favor, escribe o pega una historia');
        return;
    }

    storyText = newText;
    matchedWordsSet.clear();
    selectedPhrases = [];
    saveStoryToStorage();
    loadStoryIntoView();

    toast('✅ Historia guardada correctamente');
}

function loadStoryIntoView() {
    if (!storyText) return;

    const processed = processStoryText(storyText);
    storyWordsArray = processed.tokens.filter(t => t !== ' ');
    storyOriginalTokens = processed.originalTokens;

    const inputArea = document.getElementById('story-input-area');
    const displayArea = document.getElementById('story-display-area');

    if (inputArea) inputArea.classList.add('hidden');
    if (displayArea) displayArea.classList.remove('hidden');

    renderHighlightedText();
    renderSelectedChips();
}

function deleteStory() {
    if (confirm('¿Eliminar esta historia? Se perderá el progreso.')) {
        storyText = null;
        storyWordsArray = [];
        storyOriginalTokens = [];
        matchedWordsSet.clear();
        selectedPhrases = [];

        if (S.storyData) {
            delete S.storyData.text;
            delete S.storyData.matchedIndices;
        }
        save();

        const inputArea = document.getElementById('story-input-area');
        const displayArea = document.getElementById('story-display-area');
        const textarea = document.getElementById('story-input');

        if (inputArea) inputArea.classList.remove('hidden');
        if (displayArea) displayArea.classList.add('hidden');
        if (textarea) textarea.value = '';

        toast('🗑️ Historia eliminada');
    }
}

function closeStoryReader() {
    if (recognition) {
        try { recognition.abort(); } catch (e) { }
    }
    renderMap();
}

// ========== SPEECH (LISTENING) ==========
function speakFullStory() {
    if (!storyText) return;
    speakWithRandomVoice(storyText, 0.85);
}

function speakSelectedPhrase(phrase) {
    if (!phrase) return;
    speakWithRandomVoice(phrase, 0.7);
}

let lastVoiceIndex = -1;
let availableVoices = [];

function loadVoices() {
    return new Promise((resolve) => {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length) {
            availableVoices = voices.filter(v => v.lang.startsWith('en'));
            resolve();
        } else {
            window.speechSynthesis.onvoiceschanged = () => {
                availableVoices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
                resolve();
            };
        }
    });
}

async function speakWithRandomVoice(text, rate) {
    await loadVoices();

    if (availableVoices.length === 0) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = rate;
        window.speechSynthesis.speak(utterance);
        return;
    }

    let randomIndex = Math.floor(Math.random() * availableVoices.length);
    if (availableVoices.length > 1 && randomIndex === lastVoiceIndex) {
        randomIndex = (randomIndex + 1) % availableVoices.length;
    }
    lastVoiceIndex = randomIndex;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.voice = availableVoices[randomIndex];
    utterance.lang = 'en-US';
    utterance.rate = rate;
    utterance.pitch = 1.0;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}

// ========== SPEECH RECOGNITION (SPEAKING) ==========
function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        toast('⚠️ Tu navegador no soporta reconocimiento de voz');
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript;
            }
        }

        if (finalTranscript) {
            currentTranscript = finalTranscript;
            showRecordingResult(currentTranscript);
        }
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        stopRecording();
        toast('❌ Error al reconocer: ' + event.error);
    };

    recognition.onend = () => {
        if (isRecording) {
            stopRecording();
        }
    };
}

function startRecording() {
    if (!recognition) {
        toast('⚠️ Reconocimiento de voz no disponible');
        return;
    }

    if (!storyText) {
        toast('📖 Primero guarda una historia');
        return;
    }

    currentTranscript = '';
    isRecording = true;

    try {
        recognition.start();

        const recordBtn = document.getElementById('record-btn');
        const stopBtn = document.getElementById('stop-btn');
        const recordingResult = document.getElementById('recording-result');

        if (recordBtn) recordBtn.classList.add('hidden');
        if (stopBtn) stopBtn.classList.remove('hidden');
        if (recordingResult) recordingResult.classList.add('hidden');

        const feedback = document.getElementById('result-feedback');
        if (feedback) feedback.innerHTML = '';

        toast('🎤 Grabando... habla en inglés');
    } catch (e) {
        console.error('Error starting recording:', e);
        toast('❌ No se pudo iniciar la grabación');
        isRecording = false;
    }
}

function stopRecording() {
    if (!recognition || !isRecording) return;

    isRecording = false;

    try {
        recognition.stop();
    } catch (e) { }

    const recordBtn = document.getElementById('record-btn');
    const stopBtn = document.getElementById('stop-btn');

    if (recordBtn) recordBtn.classList.remove('hidden');
    if (stopBtn) stopBtn.classList.add('hidden');

    if (currentTranscript.trim()) {
        processSpokenText(currentTranscript);
    } else {
        toast('🎙️ No se detectó voz. Intenta de nuevo');
    }
}

function showRecordingResult(transcript) {
    const resultDiv = document.getElementById('recording-result');
    const resultText = document.getElementById('result-text');

    if (resultDiv) {
        resultDiv.classList.remove('hidden');
        resultText.textContent = transcript;
    }
}

// ========== MATCHING ALGORITHM ==========
function normalizeForComparison(text) {
    return text.toLowerCase()
        .replace(/[^\w\s\u00C0-\u024F]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}
function processSpokenText(spoken) {
    const spokenWords = normalizeForComparison(spoken).split(/\s+/);
    const storyWords  = normalizeForComparison(storyText).split(/\s+/);

    if (spokenWords.length < MIN_WORDS_TO_MATCH) {
        document.getElementById('result-feedback').innerHTML =
            `<span class="feedback-warning">⚠️ Mínimo ${MIN_WORDS_TO_MATCH} palabras para marcar progreso.</span>`;
        return;
    }

    const newMatchIndices = findBestMatches(spokenWords, storyWords);

    if (newMatchIndices.length >= MIN_WORDS_TO_MATCH) {
        newMatchIndices.forEach(i => matchedWordsSet.add(i));
        saveStoryToStorage();
        renderHighlightedText();

        const matchedText = newMatchIndices.map(i => storyWordsArray[i]).join(', ');
        document.getElementById('result-feedback').innerHTML =
            `<span class="feedback-success">✅ Palabras correctas: ${matchedText}</span>`;
        toast(`🎉 ${newMatchIndices.length} palabra(s) correcta(s)!`);
        checkCompletion();
    } else {
        document.getElementById('result-feedback').innerHTML =
            `<span class="feedback-error">😅 Pocas coincidencias. Intenta leer más despacio.</span>`;
        toast('😅 No se encontraron coincidencias suficientes.');
    }
}

// Matching tolerante: palabra spoken coincide con story si son iguales
// O si su distancia de edición es pequeña relativa al largo
function _wordsMatch(a, b) {
    if (a === b) return true;
    const maxLen = Math.max(a.length, b.length);
    if (maxLen <= 3) return false; // palabras cortas: solo exacto
    const dist = _levenshtein(a, b);
    return dist <= Math.floor(maxLen * 0.3); // 30% tolerancia
}

function _levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) => [i, ...Array(n).fill(0)]);
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
            dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
                : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
}
function findBestMatches(spokenWords, storyWords) {
    const matched = new Set();
    
    const spokenUsed = new Array(spokenWords.length).fill(false);
    
    for (let si = 0; si < storyWords.length; si++) {
        if (matchedWordsSet.has(si)) continue;
        
        for (let pi = 0; pi < spokenWords.length; pi++) {
            if (spokenUsed[pi]) continue;
            
            let len = 0;
            while (
                si + len < storyWords.length &&
                pi + len < spokenWords.length &&
                !spokenUsed[pi + len] &&
                _wordsMatch(storyWords[si + len], spokenWords[pi + len])
            ) {
                len++;
            }
            
            if (len >= MIN_WORDS_TO_MATCH) {
                for (let k = 0; k < len; k++) {
                    if (!matchedWordsSet.has(si + k)) {
                        matched.add(si + k);
                    }
                    spokenUsed[pi + k] = true;
                }
                break; // pasar a siguiente si
            }
        }
    }
    
    for (let si = 0; si < storyWords.length; si++) {
        if (matchedWordsSet.has(si) || matched.has(si)) continue;
        
        for (let pi = 0; pi < spokenWords.length; pi++) {
            if (spokenUsed[pi]) continue;
            
            if (storyWords[si] === spokenWords[pi]) {
                matched.add(si);
                spokenUsed[pi] = true;
                break;
            }
        }
    }
    
    return Array.from(matched);
}

function findAllMatchingWords(spokenWords, storyWords) {
    const matches = new Set();
    let spokenIdx = 0;

    for (let storyIdx = 0; storyIdx < storyWords.length && spokenIdx < spokenWords.length; storyIdx++) {
        if (storyWords[storyIdx] === spokenWords[spokenIdx]) {
            const originalIdx = findWordIndexInOriginal(storyWords[storyIdx]);
            if (originalIdx !== -1 && !matchedWordsSet.has(originalIdx)) {
                matches.add(originalIdx);
            }
            spokenIdx++;
        }
    }

    if (matches.size >= MIN_WORDS_TO_MATCH) {
        return Array.from(matches);
    }

    return findMatchingSequences(spokenWords, storyWords);
}

function findMatchingSequences(spokenWords, storyWords) {
    const matches = new Set();

    for (let i = 0; i <= storyWords.length - MIN_WORDS_TO_MATCH; i++) {
        for (let j = 0; j <= spokenWords.length - MIN_WORDS_TO_MATCH; j++) {
            let matchLength = 0;

            while (matchLength < Math.min(storyWords.length - i, spokenWords.length - j) &&
                storyWords[i + matchLength] === spokenWords[j + matchLength]) {
                matchLength++;
            }

            if (matchLength >= MIN_WORDS_TO_MATCH) {
                for (let k = 0; k < matchLength; k++) {
                    const storyWord = storyWords[i + k];
                    const idx = findWordIndexInOriginal(storyWord);
                    if (idx !== -1 && !matchedWordsSet.has(idx)) {
                        matches.add(idx);
                    }
                }
                i += matchLength - 1;
                break;
            }
        }
    }

    return Array.from(matches);
}

function findWordIndexInOriginal(word) {
    for (let i = 0; i < storyWordsArray.length; i++) {
        if (storyWordsArray[i] === word) {
            return i;
        }
    }
    return -1;
}

function checkCompletion() {
    const totalWords = storyWordsArray.length;
    const matchedCount = matchedWordsSet.size;

    if (matchedCount >= totalWords && totalWords > 0) {
        confetti(60);
        toast('🎉 ¡INCREÍBLE! ¡Completaste toda la historia! 🎉');
        setTimeout(() => {
            deleteStory();
            renderMap();
        }, 3000);
    }
}

// ========== UTILITIES ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function (m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
