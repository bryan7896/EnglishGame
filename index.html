<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LinguaQuest ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13112a;--bg2:#1b1836;--card:#211e3d;--card2:#2b2850;
  --border:rgba(190,170,255,0.14);
  --pri:#8b7cf8;--pri-d:#6c5ce7;
  --pink:#f06292;--yellow:#f9ca74;--mint:#55efc4;--mint-d:#00b894;--red:#ff7675;
  --text:#e4dfff;--muted:#9088bc;--locked:#1c1936;--lock-t:#4e4878;
  --r:24px;--rsm:18px;--rxs:12px;
  --sp:0 8px 28px rgba(108,92,231,.45);--sc:0 4px 20px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:0}
#app{max-width:430px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;background:var(--bg);animation:scrIn .32s cubic-bezier(.34,1.56,.64,1) both}
.screen.active{display:flex}
@keyframes scrIn{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
/* Header */
.hdr{padding:13px 18px 11px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
.logo{font-family:'Fredoka One',cursive;font-size:21px;color:var(--pri);letter-spacing:.4px}
.hdr-r{display:flex;gap:7px;align-items:center}
.badge{display:flex;align-items:center;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800}
.ico-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:transform .18s}
.ico-btn:active{transform:scale(.88)}
.back{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 6px;font-weight:700;transition:color .2s}
.back:active{color:var(--text)}
/* Mascot */
.mascot{display:flex;flex-direction:column;align-items:center;padding:14px 20px 8px}
.em{font-size:56px;line-height:1;display:block;animation:mfl 3s ease-in-out infinite}
.bubble{margin-top:9px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:8px 15px;font-size:13px;font-weight:700;color:var(--text);text-align:center;max-width:260px;animation:fup .4s ease both}
@keyframes mfl{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-7px) rotate(-3deg)}70%{transform:translateY(-3px) rotate(3deg)}}
@keyframes mbounce{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-16px) scale(1.1)}50%{transform:translateY(-6px) scale(1.05)}75%{transform:translateY(-11px) scale(1.09)}}
@keyframes mdance{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.18) rotate(-12deg)}50%{transform:scale(1.22) rotate(12deg)}75%{transform:scale(1.12) rotate(-6deg)}}
@keyframes msleep{0%,100%{transform:translateX(0)}50%{transform:translateX(4px) scale(.96)}}
@keyframes msad{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
@keyframes mpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.em.bounce{animation:mbounce .85s ease infinite}.em.dance{animation:mdance .6s ease infinite}
.em.sleep{animation:msleep 2s ease infinite}.em.sad{animation:msad 2.2s ease infinite}.em.pulse{animation:mpulse 1.1s ease infinite}
/* Setup */
.setup-body{flex:1;padding:18px 18px 28px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.setup-h{font-family:'Fredoka One',cursive;font-size:28px;color:var(--pri)}
.setup-sub{font-size:14px;color:var(--muted);font-weight:600}
.json-ta{width:100%;min-height:140px;background:var(--card);border:2px solid var(--border);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-family:'Courier New',monospace;font-size:12px;resize:vertical;outline:none;transition:border-color .2s}
.json-ta:focus{border-color:var(--pri)}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;display:none}
.info-card.show{display:block;animation:fup .3s ease both}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;font-weight:600}
.info-v{color:var(--mint);font-weight:800}
.err{color:var(--red);font-size:13px;font-weight:700;padding:9px 13px;background:rgba(255,118,117,.1);border-radius:var(--rxs);border:1px solid rgba(255,118,117,.22);display:none}
.err.show{display:block}
/* Buttons */
.btn{width:100%;padding:14px 20px;border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:transform .15s;letter-spacing:.15px}
.btn:active{transform:scale(.95)}
.btn-p{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;box-shadow:var(--sp)}
.btn-s{background:var(--card);border:2px solid var(--border);color:var(--text)}
.btn-g{background:linear-gradient(135deg,var(--mint),var(--mint-d));color:#092018;box-shadow:0 8px 24px rgba(85,239,196,.28)}
.btn-red{background:linear-gradient(135deg,#ff7675,#d63031);color:#fff}
.btn-pink{background:linear-gradient(135deg,var(--pink),#c2185b);color:#fff;box-shadow:0 8px 24px rgba(240,114,182,.3)}
/* Progress bar */
.prog-bar{margin:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 15px}
.prog-hdr{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12.5px;font-weight:700}
.prog-lbl{color:var(--muted)}.prog-cnt{color:var(--yellow)}
.bar-track{height:10px;background:var(--locked);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pink));border-radius:5px;transition:width .7s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);animation:shim 1.8s infinite}
@keyframes shim{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.streak-banner{margin:0 18px;background:linear-gradient(135deg,rgba(249,202,116,.12),rgba(253,114,66,.12));border:1px solid rgba(249,202,116,.28);border-radius:var(--rsm);padding:9px 13px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:var(--yellow)}
/* Map */
.map-body{flex:1;overflow-y:auto;padding:14px 22px 110px;display:flex;flex-direction:column}
.map-path{display:flex;flex-direction:column}
.lv-card{width:220px;background:var(--card);border:2px solid var(--border);border-radius:50px;padding:11px 16px 11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .18s;flex-shrink:0}
.lv-card:active{transform:scale(.93)}
.lv-card.done{background:linear-gradient(135deg,rgba(85,239,196,.12),rgba(0,184,148,.1));border-color:rgba(85,239,196,.38)}
.lv-card.cur{background:linear-gradient(135deg,rgba(139,124,248,.18),rgba(108,92,231,.14));border-color:var(--pri);box-shadow:0 4px 18px rgba(108,92,231,.3);animation:ecglow 2s ease infinite}
.lv-card.locked{opacity:.42;cursor:default}
.lv-card.gnode{background:linear-gradient(135deg,rgba(249,202,116,.09),rgba(240,114,182,.07));border-color:rgba(249,202,116,.25)}
.lv-card.gnode.cur{background:linear-gradient(135deg,rgba(249,202,116,.2),rgba(240,114,182,.18));border-color:var(--pink);box-shadow:0 4px 18px rgba(240,114,182,.3);animation:gcglow 2s ease infinite}
.lv-card.gnode.done{background:linear-gradient(135deg,rgba(85,239,196,.12),rgba(0,184,148,.1));border-color:rgba(85,239,196,.38)}
@keyframes ecglow{0%,100%{box-shadow:0 4px 18px rgba(108,92,231,.3)}50%{box-shadow:0 4px 26px rgba(108,92,231,.75),0 0 0 6px rgba(108,92,231,.1)}}
@keyframes gcglow{0%,100%{box-shadow:0 4px 18px rgba(240,114,182,.3)}50%{box-shadow:0 4px 26px rgba(240,114,182,.7),0 0 0 6px rgba(240,114,182,.1)}}
.lv-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.lv-info{flex:1}.lv-title{font-size:13px;font-weight:800;color:var(--text);font-family:'Fredoka One',cursive}
.lv-sub{font-size:10.5px;font-weight:600;color:var(--muted);margin-top:1px}
.connector{width:2px;height:20px;background:var(--border);border-radius:1px;margin:3px auto}
.connector.done{background:linear-gradient(to bottom,var(--mint),var(--mint-d))}
/* FAB */
.fab{position:fixed;bottom:24px;right:max(calc(50vw - 215px + 18px),18px);width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pri),var(--pink));color:#fff;font-size:21px;cursor:pointer;box-shadow:0 6px 20px rgba(139,124,248,.55);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform .2s;animation:fabpop .4s cubic-bezier(.34,1.56,.64,1) both}
.fab:active{transform:scale(.9)}
@keyframes fabpop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* Modal */
#overlay{position:fixed;inset:0;background:rgba(8,6,20,.88);z-index:200;display:none;backdrop-filter:blur(5px)}
#overlay.show{display:block}
#modal{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-radius:28px 28px 0 0;border-top:1px solid var(--border);z-index:201;display:none;padding:16px 18px max(env(safe-area-inset-bottom,0px),22px)}
#modal.show{display:block;animation:mup .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes mup{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.mpill{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 15px}
.mtitle{font-family:'Fredoka One',cursive;font-size:20px;text-align:center;margin-bottom:14px;color:var(--text)}
.mact{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--card);border-radius:var(--rsm);border:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:700;color:var(--text);width:100%;margin-bottom:7px;transition:background .15s;text-align:left}
.mact:active{background:var(--card2)}
.mact-ic{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.mact-t{flex:1}.mact-sub{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-top:1px}
.mact.danger{color:var(--red)}.mact.sc{color:var(--mint)}.mact.acc{color:var(--yellow)}.mact.ton{color:var(--pri)}.mact.pnk{color:var(--pink)}
.tbadge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:800;flex-shrink:0}
.tbadge.on{background:rgba(139,124,248,.2);color:var(--pri)}.tbadge.off{background:var(--locked);color:var(--lock-t)}
.msec{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:10px 0 7px;padding:0 2px}
.stats-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.st-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--card);border-radius:var(--rxs);border:1px solid var(--border)}
.st-l{font-size:13px;font-weight:700;color:var(--text)}.st-r{font-size:13px;font-weight:800;color:var(--pri)}
.st-total{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:linear-gradient(135deg,rgba(139,124,248,.14),rgba(240,114,182,.12));border:1px solid rgba(139,124,248,.28);border-radius:var(--rsm);margin-bottom:10px}
.st-total .st-l{font-weight:800;font-size:14px}.st-total .st-r{color:var(--yellow)}
/* Exercise screen */
.ex-body{flex:1;padding:13px 18px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.dots{display:flex;gap:6px}
.dot{flex:1;height:7px;border-radius:4px;background:var(--locked);transition:background .4s}
.dot.done{background:linear-gradient(90deg,var(--mint),var(--mint-d))}
.dot.cur{background:linear-gradient(90deg,var(--pri),var(--pri-d));animation:dblink 1.1s ease infinite}
@keyframes dblink{0%,100%{opacity:1}50%{opacity:.5}}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 18px;box-shadow:var(--sc);animation:fup .38s cubic-bezier(.34,1.56,.64,1) both}
.ex-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--pri);margin-bottom:9px}
.ex-phrase{font-size:21px;font-weight:800;color:var(--text);line-height:1.45;font-family:'Fredoka One',cursive}
.ex-hint{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600}
.ans-lbl{font-size:12px;font-weight:700;color:var(--muted)}
.chat-wrap{position:relative;background:var(--card);border:2px solid var(--border);border-radius:22px;padding:10px 50px 10px 15px;transition:border-color .2s,box-shadow .2s}
.chat-wrap:focus-within{border-color:var(--pri);box-shadow:0 0 0 3px rgba(108,92,231,.16)}
.chat-ta{width:100%;background:none;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;color:var(--text);resize:none;min-height:44px;max-height:120px;line-height:1.5;display:block}
.chat-ta::placeholder{color:var(--muted)}
.chat-send{position:absolute;right:8px;bottom:8px;width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(108,92,231,.5);transition:transform .15s}
.chat-send:active{transform:scale(.86)}
.ex-meta{text-align:center;font-size:11px;color:var(--muted);font-weight:700}
/* Audio mode (translation) */
.audio-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px 20px;display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center;animation:fup .38s cubic-bezier(.34,1.56,.64,1) both}
.spk-btn{width:76px;height:76px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pri),var(--pri-d));font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--sp);transition:transform .15s;animation:spulse 2s ease infinite}
.spk-btn:active{transform:scale(.9)}.spk-btn.going{animation:spulse 2s ease infinite,sspin .5s ease-in-out infinite alternate}
@keyframes spulse{0%,100%{box-shadow:0 6px 24px rgba(108,92,231,.5)}50%{box-shadow:0 6px 34px rgba(108,92,231,.9),0 0 0 12px rgba(108,92,231,.1)}}
@keyframes sspin{from{transform:scale(1.05) rotate(-4deg)}to{transform:scale(1.05) rotate(4deg)}}
.audio-hint{font-size:13px;color:var(--muted);font-weight:600}
.audio-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--pri)}
.reveal-btn{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:7px 16px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
.revealed-t{font-size:19px;font-weight:800;color:var(--text);font-family:'Fredoka One',cursive;line-height:1.4}
/* ===== GAME EXERCISE SCREEN ===== */
.game-body{flex:1;padding:13px 18px 18px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.gdots{display:flex;gap:5px;justify-content:center}
.gdot{width:9px;height:9px;border-radius:50%;background:var(--locked);transition:background .4s;flex-shrink:0}
.gdot.done{background:var(--mint)}.gdot.cur{background:var(--pink);animation:dblink 1.1s ease infinite}
.g-type-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px}
.gtb-fc{background:rgba(139,124,248,.15);color:var(--pri)}
.gtb-fa{background:rgba(240,114,182,.15);color:var(--pink)}
.gtb-sc{background:rgba(249,202,116,.15);color:var(--yellow)}
.gtb-fw{background:rgba(85,239,196,.15);color:var(--mint)}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sc);position:relative;overflow:hidden;animation:fup .38s cubic-bezier(.34,1.56,.64,1) both}
.game-sentence{font-size:17px;font-weight:700;color:var(--text);line-height:1.7;font-family:'Fredoka One',cursive}
.blank-w{display:inline-block;min-width:54px;border-bottom:3px solid var(--pri);color:var(--pri);font-weight:900;padding:0 3px;text-align:center}
.tts-row{display:flex;justify-content:center;margin:10px 0 4px}
.tts-g{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .2s}
.tts-g:active{color:var(--text)}.tts-g.speaking{color:var(--pink)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.choice{padding:13px 8px;background:var(--card2);border:2px solid var(--border);border-radius:var(--rsm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;text-align:center;line-height:1.3}
.choice:active{transform:scale(.95)}
.choice.sel{border-color:var(--pri);background:rgba(139,124,248,.15);color:var(--pri)}
.choice.ok{border-color:var(--mint);background:rgba(85,239,196,.15);color:var(--mint);pointer-events:none}
.choice.no{border-color:var(--red);background:rgba(255,118,117,.12);color:var(--red);pointer-events:none}
.hint-btn{background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline;padding:2px}
.hint-box{background:rgba(249,202,116,.08);border:1px solid rgba(249,202,116,.25);border-radius:var(--rsm);padding:9px 13px;font-size:13px;font-weight:600;color:var(--yellow);display:none}
.hint-box.show{display:block;animation:fup .3s ease}
/* Scramble */
.scr-ans{min-height:52px;background:var(--card2);border:2px solid var(--border);border-radius:var(--rsm);padding:9px 11px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;transition:border-color .2s;align-content:flex-start}
.scr-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.wchip{background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13.5px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;user-select:none}
.wchip:active{transform:scale(.9)}.wchip.placed{background:rgba(139,124,248,.18);border-color:var(--pri);color:var(--pri)}
.scr-empty{color:var(--muted);font-size:12px;font-style:italic;align-self:center}
/* Feedback overlay */
.fb-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:inherit;animation:scalein .35s cubic-bezier(.34,1.56,.64,1) both;z-index:10;padding:16px;text-align:center}
.fb-ov.ok{background:rgba(14,28,21,.94)}.fb-ov.bad{background:rgba(28,10,10,.94)}
.fb-em{font-size:44px}.fb-title{font-size:19px;font-weight:900}
.fb-ok{color:var(--mint)}.fb-bad{color:var(--red)}
.fb-ans{font-size:13px;font-weight:700;color:var(--muted);margin-top:4px;line-height:1.5}
/* Story header on game screen */
.story-hdr{text-align:center;padding:4px 0}
.story-title-sm{font-family:'Fredoka One',cursive;font-size:14px;color:var(--pink)}
/* Complete screens */
.cmp-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px 30px;gap:15px;text-align:center;overflow-y:auto}
.cmp-title{font-family:'Fredoka One',cursive;font-size:27px;color:var(--text)}
.cmp-sub{font-size:14px;color:var(--muted);font-weight:600}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);padding:13px 10px;text-align:center}
.sv{font-size:20px;font-weight:900;color:var(--pri);display:block;line-height:1.2}
.sl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;display:block}
.final-em{font-size:72px;animation:mdance .65s ease infinite}
.final-msg{font-size:14px;color:var(--muted);font-weight:600;line-height:1.65;max-width:280px}
.time-table{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px}
.time-table-h{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

<body>
<div id="app"></div>
<div id="ck"></div>
<div id="toast"></div>
<div id="overlay" onclick="closeModal()"></div>
<div id="modal"></div>

<script>
// ════ STATE ════
const SK = 'lq_v5';
function defS() {
    return {
        exercises: [], levels: [], responses: {},
        storyData: [], gameProgress: {},
        currentLevel: 0, currentExInLevel: 0,
        levelTimes: {}, totalMs: 0,
        streak: 0, lastStudyDate: null,
        dailyCount: 0, dailyDate: null,
        totalHistorical: 0, lastActivity: null,
        audioMode: false
    };
}
let S = defS(), lastMsg = -1;

// Game ephemeral state
let gStory = null, gStoryIdx = -1, gExIdx = 0, gNodeIdx = -1, gGameStart = null;
let gWords = [], gPlaced = [];
let gSelected = null;

const MSGS = ['¡Vas increíble! 🔥', 'Ya estás dominando esto 💪', '¡No te rindas! 😄',
    'Tu inglés está mejorando mucho ✨', '¡Un ejercicio más! 💪', 'Excelente consistencia 🌟',
    '¡Eso es! ¡Sigue así! 🎯', 'Cada respuesta te hace más fluido 🌊',
    '¡Eres imparable! ⚡', 'Tu esfuerzo vale la pena 💎', '¡Fantástico! 🚀',
    '¡Sigue brillando! 🌈', 'Tu cerebro lo está asimilando 🧠',
];
const MASCOTS = {
    idle: { e: '😊', a: '', m: '¡Listo para estudiar! 🚀' },
    happy: { e: '😄', a: 'bounce', m: '¡Excelente trabajo! 👏' },
    cool: { e: '😎', a: '', m: '¡Qué consistencia tan increíble!' },
    sad: { e: '😢', a: 'sad', m: 'Te extrañé... ¡Vuelve a estudiar!' },
    sleep: { e: '😴', a: 'sleep', m: 'Zzz... despiértame cuando estudies!' },
    party: { e: '🥳', a: 'dance', m: '¡Meta cumplida! 🎉' },
    push: { e: '💪', a: 'pulse', m: '¡Tú puedes! ¡Sigue adelante!' },
};

// ════ STORAGE ════
function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch (e) { } }
function load() { try { const r = localStorage.getItem(SK); if (r) S = { ...defS(), ...JSON.parse(r) }; } catch (e) { S = defS(); } }

// ════ STREAK & LEVELS ════
function checkStreak() {
    const today = new Date().toDateString();
    if (S.dailyDate !== today) {
        const yest = new Date(Date.now() - 86400000).toDateString();
        if (S.lastStudyDate === yest) S.streak = (S.streak || 0) + 1;
        else if (S.lastStudyDate !== today) S.streak = 1;
        S.dailyDate = today; S.dailyCount = 0;
    }
    S.lastStudyDate = today; save();
}
function buildLevels(arr) { const r = []; for (let i = 0; i < arr.length; i += 3) r.push(arr.slice(i, i + 3).map((_, j) => i + j)); return r; }
function lvlDone(li) { return S.levels[li]?.every(i => S.responses[i] !== undefined) ?? false; }
function storyDone(si) {
    const st = S.storyData[si]; const p = S.gameProgress[si];
    if (!st || !p) return false;
    return st.exercises.every((_, i) => p.answers && p.answers[i] !== undefined);
}
function totalDone() { return Object.keys(S.responses).length; }
function allExDone() { return S.exercises.length > 0 && totalDone() >= S.exercises.length; }

// ════ MAP NODES ════
function buildNodes() {
    const nodes = [];
    let ei = 0, gi = 0, vi = 0;
    let lastWasVerbGame = false;
    let verbGamesCount = 0;
    
    // Contar cuántos juegos de verbos hay
    const verbGames = S.verbGamesData || [];
    
    while (ei < S.levels.length || gi < S.storyData.length || vi < verbGames.length) {
        // Insertar juego de verbos cada 2 nodos (si hay disponibles)
        if (verbGamesCount < verbGames.length && (nodes.length % 3 === 2 || (S.levels.length === 0 && S.storyData.length === 0))) {
            nodes.push({ type: 'verbGame', vi: verbGamesCount++ });
        }
        // Insertar niveles de traducción
        else if (ei < S.levels.length) {
            nodes.push({ type: 'ex', li: ei++ });
        }
        // Insertar juegos de historia existentes
        else if (gi < S.storyData.length) {
            nodes.push({ type: 'game', si: gi++ });
        }
        // Si solo hay juegos de verbos
        else if (vi < verbGames.length) {
            nodes.push({ type: 'verbGame', vi: vi++ });
        }
    }
    
    return nodes;
}
function nodeDone(n) {
    if (n.type === 'ex') return lvlDone(n.li);
    if (n.type === 'game') return storyDone(n.si);
    if (n.type === 'verbGame') {
        const verbData = S.verbGamesData?.[n.vi];
        if (!verbData) return false;
        const verbGameId = `verb_${verbData.spanishWord}`;
        return S.gameProgress[verbGameId]?.answers?.completed === true;
    }
    return false;
}
function nodeOpen(ni, nodes) { return ni === 0 || nodeDone(nodes[ni - 1]); }
function activeNodeIdx(nodes) {
    for (let i = 0; i < nodes.length; i++) if (!nodeDone(nodes[i]) && nodeOpen(i, nodes)) return i;
    return Math.max(0, nodes.length - 1);
}

// ════ MASCOT ════
function getMascot() {
    const last = S.lastActivity, now = Date.now();
    if (last) { const d = (now - last) / 60000; if (d > 180) return MASCOTS.sleep; if (d > 60) return MASCOTS.sad; }
    const nodes = buildNodes();
    if (nodes.every(n => nodeDone(n)) && nodes.length > 0) return MASCOTS.party;
    if (S.streak >= 7) return MASCOTS.cool;
    if (totalDone() === 0) return MASCOTS.idle;
    return totalDone() < 5 ? MASCOTS.push : MASCOTS.happy;
}
function randMsg() {
    let i; do { i = Math.floor(Math.random() * MSGS.length); } while (i === lastMsg && MSGS.length > 1);
    lastMsg = i; return MSGS[i];
}

// ════ TIME ════
function fmtMs(ms) {
    if (!ms || ms < 0) return '—';
    if (ms < 60000) return Math.round(ms / 1000) + 's';
    return Math.floor(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
}
function fmtAvg(ms, n) { return (!n || !ms) ? '—' : fmtMs(ms / n); }

// ════ SOUND / CONFETTI / TOAST / HELPERS ════
const CC = ['#8b7cf8', '#f06292', '#f9ca74', '#55efc4', '#74b9ff', '#fd79a8', '#a29bfe'];
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function norm(s) { return (s || '').toLowerCase().trim().replace(/\s+/g, ' '); }

let toastT;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2700);
}

function isVerbGameNode(node) {
    return node.type === 'verbGame';
}

function getVerbGameData(verbId) {
    return S.verbGamesData?.find(v => v.spanishWord === verbId) || null;
}

function confetti(n) {
    const ck = document.getElementById('ck'); ck.innerHTML = '';
    for (let i = 0; i < n; i++) {
        const p = document.createElement('div'); p.className = 'cp';
        p.style.left = Math.random() * 100 + '%'; p.style.top = '-15px';
        p.style.background = CC[Math.floor(Math.random() * CC.length)];
        const sz = 7 + Math.random() * 10; p.style.width = sz + 'px'; p.style.height = sz + 'px';
        p.style.borderRadius = Math.random() > .5 ? '50%' : '3px';
        p.style.animationDuration = (1.6 + Math.random() * 2) + 's';
        p.style.animationDelay = (Math.random() * .8) + 's';
        ck.appendChild(p);
    }
    setTimeout(() => ck.innerHTML = '', 4800);
}

// ════ TIMERS FOR EXERCISES ════
let lvlStart = null, exStart = null;
// ════ MODAL ════
function openModal(html) {
    document.getElementById('modal').innerHTML = html;
    document.getElementById('modal').classList.add('show');
    document.getElementById('overlay').classList.add('show');
}
function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
}
function openOptions() {
    const done = totalDone(), tot = S.exercises.length;
    const stCount = S.storyData.length;
    const vgCount = S.verbGamesData?.length || 0;
    openModal(`
<div class="mpill"></div><div class="mtitle">⚙️ Opciones</div>
<div class="msec">MODO DE PRÁCTICA</div>
<button class="mact ${S.audioMode ? 'ton' : ''}" onclick="toggleAudio()">
  <span class="mact-ic">${S.audioMode ? '🔊' : '📝'}</span>
  <span class="mact-t">Modo audio<span class="mact-sub">Escucha la frase en vez de leerla</span></span>
  <span class="tbadge ${S.audioMode ? 'on' : 'off'}">${S.audioMode ? 'ON' : 'OFF'}</span>
</button>
<div class="msec">PROGRESO</div>
${done > 0 ? `<button class="mact acc" onclick="closeModal();copyPartial()">
  <span class="mact-ic">📋</span>
  <span class="mact-t">Copiar avances<span class="mact-sub">${done} de ${tot} respuestas</span></span>
</button>` : ''}
<button class="mact sc" onclick="closeModal();openAddModal()">
  <span class="mact-ic">➕</span>
  <span class="mact-t">Agregar ejercicios<span class="mact-sub">Concatenar sin perder progreso</span></span>
</button>
<button class="mact pnk" onclick="closeModal();openStoriesModal()">
  <span class="mact-ic">🎮</span>
  <span class="mact-t">Cargar juegos de historia<span class="mact-sub">${stCount > 0 ? stCount + ' historias cargadas' : 'Sin historias aún'}</span></span>
</button>
<button class="mact" onclick="closeModal();openVerbGamesModal()">
  <span class="mact-ic">📖</span>
  <span class="mact-t">Cargar Verb Quest<span class="mact-sub">${vgCount > 0 ? vgCount + ' verbos cargados' : 'Sin juegos de verbos'}</span></span>
</button>
<button class="mact" onclick="closeModal();openStats()">
  <span class="mact-ic">📊</span>
  <span class="mact-t">Estadísticas<span class="mact-sub">Tiempo por nivel y totales</span></span>
</button>
<div class="msec">ZONA PELIGROSA</div>
<button class="mact danger" onclick="confirmReset()">
  <span class="mact-ic">🔄</span>
  <span class="mact-t">Reiniciar progreso<span class="mact-sub">Borra respuestas y estadísticas</span></span>
</button>
<button class="mact danger" onclick="confirmClear()">
  <span class="mact-ic">🗑️</span>
  <span class="mact-t">Cargar nuevos ejercicios<span class="mact-sub">Reemplaza todo</span></span>
</button>
`);
}
function openVerbGamesModal() {
    const has = S.verbGamesData?.length > 0;
    openModal(`<div class="mpill"></div><div class="mtitle">📖 Verb Quest · Juegos de Verbos</div>
${has ? `<div class="info-card show" style="background:rgba(139,124,248,.07);border-color:rgba(139,124,248,.25);margin-bottom:12px">
  <div class="info-row"><span>📚 Verbos cargados</span><span class="info-v" style="color:var(--pri)">${S.verbGamesData.length}</span></div>
  <div class="info-row"><span>🎯 Verbos completados</span><span class="info-v" style="color:var(--mint)">${Object.keys(S.gameProgress).filter(k => k.startsWith('verb_') && S.gameProgress[k]?.answers?.completed).length}</span></div>
</div>` : ''}
<p style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:11px;text-align:center">Pega un array de verbos irregulares con sus formas y oraciones</p>
<textarea class="json-ta" id="verbgames-json" placeholder='[
  {
    "spanishWord": "romper",
    "verb": "break",
    "past": "broke",
    "participle": "broken",
    "verbSentenceEnglish": "I always break the chocolate in half.",
    "verbSentenceSpanish": "Siempre rompo el chocolate por la mitad.",
    "pastSentenceEnglish": "He broke his favorite mug yesterday.",
    "pastSentenceSpanish": "Él rompió su taza favorita ayer.",
    "participleSentenceEnglish": "The window is broken.",
    "participleSentenceSpanish": "La ventana está rota."
  }
]' oninput="prevVerbGames()" style="min-height:180px;margin-bottom:9px"></textarea>
<div class="err" id="verbgames-err"></div>
<div class="info-card" id="verbgames-prev" style="margin-bottom:9px"></div>
<button class="btn btn-p" style="margin-bottom:8px" onclick="doLoadVerbGames()">📖 ${has ? 'Reemplazar juegos de verbos' : 'Cargar juegos de verbos'}</button>
<button class="btn btn-s" onclick="closeModal()">Cancelar</button>`);
}

function prevVerbGames() {
    const v = (document.getElementById('verbgames-json') || {}).value || '';
    const pv = document.getElementById('verbgames-prev'), er = document.getElementById('verbgames-err');
    if (!v.trim()) { pv?.classList.remove('show'); er?.classList.remove('show'); return; }
    try {
        const p = JSON.parse(v);
        if (!Array.isArray(p) || p.length === 0) throw new Error('Debe ser un array no vacío');
        // Validar estructura de cada verbo
        for (let i = 0; i < p.length; i++) {
            const verb = p[i];
            if (!verb.spanishWord || !verb.verb || !verb.past || !verb.participle) {
                throw new Error(`Verbo ${i + 1}: faltan campos requeridos (spanishWord, verb, past, participle)`);
            }
        }
        if (pv) {
            pv.innerHTML = `<div class="info-row"><span>📖 Verbos</span><span class="info-v" style="color:var(--pri)">${p.length}</span></div>
                           <div class="info-row"><span>📝 Ejemplos</span><span class="info-v">${p.reduce((a, v) => a + 3, 0)} oraciones</span></div>`;
            pv.classList.add('show');
        }
        if (er) er.classList.remove('show');
    } catch (e) {
        if (pv) pv.classList.remove('show');
        if (er) { er.textContent = '⚠️ ' + e.message; er.classList.add('show'); }
    }
}

function buildText(partial) {
    let txt = '';
    S.exercises.forEach((ph, i) => {
        const r = S.responses[i];
        if (partial && r === undefined) return;
        txt += `${i + 1}. ${ph}\nMi respuesta: ${r || '(sin respuesta)'}\n\n`;
    });
    if (!partial) {
        S.storyData.forEach((st, si) => {
            const p = S.gameProgress[si]; if (!p?.answers) return;
            txt += `\n--- Historia ${si + 1}: ${st.title} ---\n`;
            st.exercises.forEach((ex, ei) => {
                const a = p.answers[ei];
                if (a !== undefined) txt += `Ej.${ei + 1} (${ex.type}): ${a} ${p.correct?.[ei] ? '✅' : '❌'}\n`;
            });
        });
        txt += `\n--- Estadísticas ---\nTiempo total: ${fmtMs(S.totalMs)}\nEjercicios: ${totalDone()} / ${S.exercises.length}\nRacha: ${S.streak} días\n\n`;
        S.levels.forEach((ea, li) => { const t = S.levelTimes[li]; if (t) txt += `Nivel ${li + 1}: ${fmtMs(t)}\n`; });
        S.storyData.forEach((st, si) => {
            const p = S.gameProgress[si];
            if (p?.timeMs) {
                const c = Object.values(p.correct || {}).filter(Boolean).length;
                txt += `Historia "${st.title}": ${fmtMs(p.timeMs)} — ${c}/${st.exercises.length} correctas\n`;
            }
        });
    }
    return txt.trim();
}
function clip(txt, msg) {
    navigator.clipboard?.writeText(txt).then(() => toast(msg)).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0;left:-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); toast(msg);
    });
}
function copyPartial() { const txt = buildText(true); if (!txt) { toast('⚠️ No hay respuestas aún'); return; } clip(txt, `✅ ${totalDone()} respuestas copiadas`); }
function copyAnswers() { clip(buildText(false), '✅ Respuestas y estadísticas copiadas!'); }

// ════ MAP SCREEN - VERSIÓN REDISEÑADA ════
function renderMap() {
    checkStreak();
    const nodes = buildNodes();
    const done = totalDone(), tot = S.exercises.length;
    const pct = tot > 0 ? Math.min(100, Math.round(done / tot * 100)) : 0;
    const mc = getMascot();
    const al = activeNodeIdx(nodes);
    
    // Generar HTML de los nodos con diseño moderno
    let nodesH = '';
    
    nodes.forEach((node, ni) => {
        const isDone = nodeDone(node);
        const isOpen = nodeOpen(ni, nodes);
        const isAct = ni === al && !isDone;
        const isLocked = !isDone && !isOpen;
        
        // Determinar tipo de nodo
        let nodeIcon = '', nodeTitle = '', nodeSubtitle = '', nodeColor = '';
        
        if (node.type === 'ex') {
            const ea = S.levels[node.li];
            const c = ea.filter(i => S.responses[i] !== undefined).length;
            nodeIcon = isDone ? '🏆' : isAct ? '🎯' : isLocked ? '🔒' : '📚';
            nodeTitle = `Nivel ${node.li + 1}`;
            nodeSubtitle = isDone ? `${c}/${ea.length} completado` : (isAct ? 'En curso' : `${c}/${ea.length} ejercicios`);
            nodeColor = isDone ? 'var(--mint)' : isAct ? 'var(--pri)' : 'var(--muted)';
        } 
        else if (node.type === 'game') {
            const st = S.storyData[node.si];
            nodeIcon = isDone ? '⭐' : isAct ? '🎮' : isLocked ? '🔒' : '📖';
            nodeTitle = st?.title || 'Historia';
            nodeSubtitle = isDone ? 'Completada' : (isAct ? 'Jugar ahora' : 'Bloqueado');
            nodeColor = isDone ? 'var(--mint)' : isAct ? 'var(--pink)' : 'var(--muted)';
        }
        else if (node.type === 'verbGame') {
            const verbData = S.verbGamesData?.[node.vi];
            nodeIcon = isDone ? '🏅' : isAct ? '🎮' : isLocked ? '🔒' : '📝';
            nodeTitle = `Verb: ${verbData?.spanishWord || '?'}`;
            nodeSubtitle = isDone ? 'Dominado' : (isAct ? 'Practicar' : 'Completa el anterior');
            nodeColor = isDone ? 'var(--mint)' : isAct ? 'var(--yellow)' : 'var(--muted)';
        }
        
        const canTap = isDone || isOpen;
        const onClick = canTap ? `startNode(${ni})` : '';
        
        // Nodo con diseño moderno
        nodesH += `
            <div class="map-node ${isDone ? 'done' : isAct ? 'active' : 'locked'} ${node.type === 'verbGame' ? 'verb-node' : ''}" 
                 style="animation-delay: ${ni * 0.05}s"
                 onclick="${onClick}">
                <div class="map-node-icon" style="background: ${nodeColor}20; border-color: ${nodeColor}">
                    <span class="map-node-emoji">${nodeIcon}</span>
                </div>
                <div class="map-node-content">
                    <div class="map-node-title" style="color: ${nodeColor}">${nodeTitle}</div>
                    <div class="map-node-subtitle">${nodeSubtitle}</div>
                </div>
                ${!isLocked ? `<div class="map-node-arrow">→</div>` : ''}
            </div>
        `;
        
        // Conector entre nodos
        if (ni < nodes.length - 1) {
            nodesH += `<div class="map-connector ${isDone ? 'done' : ''}"></div>`;
        }
    });
    
    // Mensaje emocional según el progreso
    let emotionalMessage = '';
    let emotionalEmoji = '';
    if (done === 0) {
        emotionalMessage = '¡Comienza tu aventura! 🚀';
        emotionalEmoji = '🌱';
    } else if (done === tot) {
        emotionalMessage = '¡Eres una leyenda! ✨🎉';
        emotionalEmoji = '🏆';
    } else if (pct >= 75) {
        emotionalMessage = '¡Estás muy cerca! 💪🔥';
        emotionalEmoji = '🎯';

function startNode(ni) {
    const nodes = buildNodes(); if (!nodes[ni]) return;
    const node = nodes[ni];
    if (!nodeOpen(ni, nodes) && !nodeDone(node)) { toast('🔒 Completa el nivel anterior primero'); return; }
    if (node.type === 'ex') startExercise(node.li, ni);
    else if (node.type === 'game') startGame(node.si, ni);
    else if (node.type === 'verbGame') {
        const verbData = S.verbGamesData?.[node.vi];
        if (verbData) startVerbGame(verbData, ni);
        else toast('⚠️ Error al cargar el juego');
    }
}
function loadVerbGames(verbDataArray) {
    // Preservar progreso de juegos de verbos ya completados
    const existingProgress = {};
    if (S.verbGamesData && S.gameProgress) {
        S.verbGamesData.forEach((oldVerb, idx) => {
            const oldId = `verb_${oldVerb.spanishWord}`;
            if (S.gameProgress[oldId]?.answers?.completed) {
                existingProgress[oldId] = S.gameProgress[oldId];
            }
        });
    }
    
    S.verbGamesData = verbDataArray;
    
    // Restaurar progreso para verbos que ya existían
    verbDataArray.forEach(verb => {
        const verbId = `verb_${verb.spanishWord}`;
        if (existingProgress[verbId]) {
            S.gameProgress[verbId] = existingProgress[verbId];
        }
    });
    
    save();
    renderMap();
    toast(`✅ ${verbDataArray.length} juegos de verbos cargados`);
}

function speakLang(text, lang, onend) {
    if (!window.speechSynthesis) { if (onend) onend(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang || 'es-MX';
    utt.rate = 0.85;
    utt.onend = utt.onerror = () => { if (onend) onend(); };
    const go = () => {
        const vs = window.speechSynthesis.getVoices();
        const v = vs.find(x => x.lang === lang) || vs.find(x => x.lang.startsWith((lang || 'es').split('-')[0])) || null;
        if (v) utt.voice = v;
        window.speechSynthesis.speak(utt);
    };
    window.speechSynthesis.getVoices().length ? go() : (window.speechSynthesis.onvoiceschanged = go);
}

function playBeep(cb) {
    try {
        const c = new (window.AudioContext || window.webkitAudioContext)();
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'square';
        o.frequency.value = 440;
        g.gain.setValueAtTime(0.08, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.35);
        o.start();
        o.stop(c.currentTime + 0.35);
        o.onended = () => { c.close(); if (cb) cb(); };
    } catch (e) { if (cb) cb(); }
}

function speakTranslation(text) {
    const btn = document.getElementById('spk-btn');
    if (btn) btn.classList.add('going');
    speakLang(text, 'es-MX', () => {
        const b = document.getElementById('spk-btn');
        if (b) b.classList.remove('going');
    });
}

function revealText() {
    const d = document.getElementById('revealed'), b = document.getElementById('reveal-btn');
    if (d) d.style.display = 'block';
    if (b) b.style.display = 'none';
}

function playPing() {
    try {
        const c = new (window.AudioContext || window.webkitAudioContext)();
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(540, c.currentTime);
        o.frequency.exponentialRampToValueAtTime(880, c.currentTime + 0.12);
        g.gain.setValueAtTime(0.12, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
        o.start();
        o.stop(c.currentTime + 0.32);
    } catch (e) { }
}

function startGame(si, ni) {
    gStoryIdx = si;

    gStory = S.storyData[si];
    if (!gStory) return;
    if (!S.gameProgress[si]) S.gameProgress[si] = { answers: {}, correct: {}, timeMs: 0 };
    S.gameProgress[si].startTime = Date.now();
    S.lastActivity = Date.now();
    
    // Find first unanswered exercise
    let start = 0, allAns = true;
    for (let i = 0; i < gStory.exercises.length; i++) {
        if (S.gameProgress[si].answers[i] === undefined) {
            start = i;
            allAns = false;
            break;
        }
    }
    if (allAns) {
        renderGameComplete();
        return;
    }
    gExIdx = start;
    save();
    renderGameEx();
}

function playGameTTS(ex) {
    const btn = document.getElementById('tts-g-btn');
    if (btn) {
        btn.classList.add('speaking');
        btn.textContent = '🔊 Escuchando...';
    }

    const done = () => {
        const b = document.getElementById('tts-g-btn');
        if (b) {
            b.classList.remove('speaking');
            b.textContent = '🔊 Escuchar';
        }
    };

    const { tts, sentence } = ex;

    if (!tts?.enabled) {
        done();
        return;
    }

    if (ex.type === 'scramble' && tts.textToRead) {
        speakLang(tts.textToRead, 'en-US', done);
        return;
    }

    if (tts.readFullSentence) {
        const txt = (sentence || '').replace(/_{2,}(\s*\([^)]+\))?/g, tts.blankReplacement || 'blank');
        speakLang(txt, 'en-US', done);
        return;
    }

    // fill_audio: split and beep
    const parts = (sentence || '').split('___');
    if (parts.length >= 2) {
        speakLang(parts[0].trim(), 'en-US', () => {
            playBeep(() => {
                const rest = parts[1].trim();
                if (rest) speakLang(rest, 'en-US', done);
                else done();
            });
        });
    } else {
        speakLang(sentence || '', 'en-US', done);
    }
}

function selectChoice(btn) {
    document.querySelectorAll('.choice').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    gSelected = btn.dataset.val;
    const cb = document.getElementById('game-check-btn');
    if (cb) cb.disabled = false;
}

function checkChoice() {
    if (!gSelected) return;
    const ex = gStory.exercises[gExIdx];
    const correct = gSelected === ex.correct;
    document.querySelectorAll('.choice').forEach(b => {
        if (b.dataset.val === ex.correct) b.classList.add('ok');
        else if (b.dataset.val === gSelected && !correct) b.classList.add('no');
    });
    const cb = document.getElementById('game-check-btn');
    if (cb) cb.disabled = true;
    showFeedback(correct, ex.correct, () => saveGameAnswer(gSelected, correct));
}

function pickWord(id) {
    const w = gWords.find(x => x.id === id);
    if (!w || w.used) return;
    w.used = true;
    gPlaced.push(id);
    updateScramble();
}

function unpickWord(idx) {
    const id = gPlaced[idx];
    gPlaced.splice(idx, 1);
    const w = gWords.find(x => x.id === id);
    if (w) w.used = false;
    updateScramble();
}

function updateScramble() {
    const ans = document.getElementById('scr-ans'), pool = document.getElementById('scr-pool');
    if (!ans || !pool) return;
    
    ans.innerHTML = gPlaced.length === 0 ? '<span class="scr-empty">Toca las palabras para ordenarlas</span>'
        : gPlaced.map((id, i) => {
            const w = gWords.find(x => x.id === id);
            return `<div class="wchip placed" onclick="unpickWord(${i})">${esc(w?.word || '')}</div>`;
        }).join('');
    
    pool.innerHTML = gWords.filter(w => !w.used).map(w => `<div class="wchip" data-id="${w.id}" onclick="pickWord(${w.id})">${esc(w.word)}</div>`).join('');
    
    const cb = document.getElementById('game-check-btn');
    if (cb) cb.disabled = gPlaced.length !== gWords.length;
}

function checkScramble() {
    const ex = gStory.exercises[gExIdx];
    const answer = gPlaced.map(id => gWords.find(x => x.id === id)?.word || '').join(' ');
    const correct = norm(answer) === norm(ex.correctOrder || '');
    showFeedback(correct, ex.correctOrder, () => saveGameAnswer(answer, correct));
}

function checkWrite() {
    const inp = document.getElementById('game-ans');
    const ans = (inp?.value || '').trim();
    if (!ans) {
        toast('✏️ Escribe tu respuesta');
        inp?.focus();
        return;

    const ex = gStory.exercises[gExIdx];
    const correct = norm(ans) === norm(ex.correct || '');

}

function showFeedback(correct, correctAns, cb) {
    if (correct) playPing();
    if (navigator.vibrate) navigator.vibrate(correct ? [40] : [80, 40, 80]);
    
    const card = document.querySelector('.game-card');
    if (!card) {
        if (cb) cb();
        return;
    }
    
    const fb = document.createElement('div');
    fb.className = 'fb-ov ' + (correct ? 'ok' : 'bad');
    fb.innerHTML = `<div class="fb-em">${correct ? '✅' : '❌'}</div>
        <div class="fb-title ${correct ? 'fb-ok' : 'fb-bad'}">${correct ? '¡Correcto!' : 'Incorrecto'}</div>
        ${!correct ? `<div class="fb-ans">La respuesta correcta es:<br><strong>${esc(correctAns || '')}</strong></div>` : ''}`;
    card.appendChild(fb);
    
    const delay = correct ? 1600 : 2600;
    setTimeout(() => {
        if (cb) cb();
    }, delay);

function saveGameAnswer(answer, correct) {
    const p = S.gameProgress[gStoryIdx];
    if (!p) return;
    p.answers[gExIdx] = answer;
    p.correct[gExIdx] = correct;
    save();
    
    // Next exercise
    let next = gExIdx + 1;
    while (next < gStory.exercises.length && p.answers[next] !== undefined) next++;
    
    if (next < gStory.exercises.length) {
        gExIdx = next;
        setTimeout(() => renderGameEx(), 300);
    } else {
        if (p.startTime) {
            p.timeMs = (p.timeMs || 0) + (Date.now() - p.startTime);
            p.startTime = null;
        }
        save();
        setTimeout(() => renderGameComplete(), 300);
    }
}

function createWordSearchGrid(words, SIZE = 5) {
    const g = Array.from({ length: SIZE }, () => Array(SIZE).fill(''));
    const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    const DIRS = [
        [0, 1],   // →
        [1, 0],   // ↓
        [0, -1],  // ←
        [-1, 0],  // ↑
    ];

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function inside(r, c) {
        return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }

    function generateDynamicPath(word) {
        const attempts = 500;

        for (let attempt = 0; attempt < attempts; attempt++) {

            const startR = Math.floor(Math.random() * SIZE);
            const startC = Math.floor(Math.random() * SIZE);

            const visited = new Set();
            const path = [];

            let currentR = startR;
            let currentC = startC;

            let currentDir = null;
            let turns = 0;

            function walk(index) {

                const key = `${currentR},${currentC}`;

                if (!inside(currentR, currentC)) return false;
                if (visited.has(key)) return false;

                const cell = g[currentR][currentC];

                if (cell !== '' && cell !== word[index]) {
                    return false;
                }

                visited.add(key);

                path.push({
                    r: currentR,
                    c: currentC
                });

                if (index === word.length - 1) {
                    return true;
                }

                const dirs = shuffle(DIRS);

                for (const dir of dirs) {

                    const [dr, dc] = dir;

                    const prevR = currentR;
                    const prevC = currentC;
                    const prevDir = currentDir;
                    const prevTurns = turns;

                    if (
                        currentDir &&
                        (currentDir[0] !== dr || currentDir[1] !== dc)
                    ) {
                        turns++;
                    }

                    // Máximo 2 giros
                    if (turns > 2) {
                        turns = prevTurns;
                        continue;
                    }

                    currentDir = dir;

                    currentR += dr;
                    currentC += dc;

                    const ok = walk(index + 1);

                    if (ok) return true;

                    currentR = prevR;
                    currentC = prevC;
                    currentDir = prevDir;
                    turns = prevTurns;
                }

                visited.delete(key);
                path.pop();

                return false;
            }

            if (walk(0)) {
                return path;
            }
        }

        return null;
    }

    const placed = {};

    const sorted = [...words].sort((a, b) => b.length - a.length);

    for (const word of sorted) {

        const W = word.toUpperCase();

        const path = generateDynamicPath(W);

        if (!path) {
            console.warn('No pudo colocar:', W);
            continue;
        }

        path.forEach(({ r, c }, i) => {
            g[r][c] = W[i];
        });

        placed[W] = path.map(({ r, c }) => `${r},${c}`);
    }

    // Rellenar vacíos
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (!g[r][c]) {
                g[r][c] = ALPHA[Math.floor(Math.random() * ALPHA.length)];
            }
        }
    }

    return {
        g,
        paths: placed
    };
}

function wsToggleHint(chipEl) {
    const word = chipEl.dataset.word;
    const cidx = parseInt(chipEl.dataset.cidx);
    if (verbGameState.wsFoundColors?.[word] !== undefined) return;

    const path = verbGameState.wordSearchPaths?.[word];
    if (!path) return;

    // Limpiar hints anteriores
    document.querySelectorAll('.ws-cell').forEach(el => {
        if (!el.dataset.found) {
            el.style.background = 'var(--card)';
            el.style.borderColor = 'transparent';
        }
    });

    if (verbGameState.wsHintWord === word) {
        verbGameState.wsHintWord = null;
        return;
    }
    verbGameState.wsHintWord = word;
    const col = WS_COLORS[cidx];
    path.forEach(key => {
        const [r, c] = key.split(',').map(Number);
        const el = document.querySelector(`.ws-cell[data-row="${r}"][data-col="${c}"]`);
        if (el && !el.dataset.found) {
            el.style.background = col.hint;
            el.style.borderColor = col.hintBorder;
        }
    });
}

function initWordSearchSelection() {
    const cont = document.getElementById('ws-grid-container');
    if (!cont) return;

    function getCell(e) {
        let el = e.target;
        if (e.touches?.length) el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        return el?.closest?.('.ws-cell');
    }

    function clearSelStyle() {
        selCells.forEach(k => {
            const [r, c] = k.split(',').map(Number);
            const el = document.querySelector(`.ws-cell[data-row="${r}"][data-col="${c}"]`);
            if (el && !el.dataset.found) {

                el.style.borderColor = 'transparent';
            }
        });
        selCells = [];
        wsApplyFoundStyles();

            const words = [
                verbGameState.currentVerbData.verb.toUpperCase(),
                verbGameState.currentVerbData.past.toUpperCase(),
                verbGameState.currentVerbData.participle.toUpperCase()
            ];
            const cidx = words.indexOf(verbGameState.wsHintWord);
            if (cidx >= 0) {
                const col = WS_COLORS[cidx];
                (verbGameState.wordSearchPaths[verbGameState.wsHintWord] || []).forEach(key => {
                    const [r, c] = key.split(',').map(Number);
                    const el = document.querySelector(`.ws-cell[data-row="${r}"][data-col="${c}"]`);
                    if (el && !el.dataset.found) {
                        el.style.background = col.hint;
                        el.style.borderColor = col.hintBorder;
                    }
                });
            }
        }
    }

    function checkWord() {
        const words = [
            verbGameState.currentVerbData.verb.toUpperCase(),
            verbGameState.currentVerbData.past.toUpperCase(),
            verbGameState.currentVerbData.participle.toUpperCase()
        ];
        const selected = selCells.map(k => {
            const [r, c] = k.split(',').map(Number);
            return document.querySelector(`.ws-cell[data-row="${r}"][data-col="${c}"]`)?.textContent?.trim() || '';
        }).join('');

        for (let i = 0; i < words.length; i++) {
            const w = words[i];
            const uniqueKey = `${w}_${i}`;
            if (selected === w && (verbGameState.wsFoundColors || {})[uniqueKey] === undefined) {
                if (!verbGameState.wsFoundColors) verbGameState.wsFoundColors = {};
                verbGameState.wsFoundColors[uniqueKey] = i;
                if (verbGameState.wsHintWord === w) verbGameState.wsHintWord = null;
                verbGameState.wordSearchFound.push({ word: w, cells: [...selCells] });
                wsApplyFoundStyles();
                updateWordSearchUI();
                playPing();
                toast(`✅ ¡Encontraste "${w}"!`);
                return true;
            }
        }
        return false;
    }

    fresh.addEventListener('mousedown', e => {
        e.preventDefault(); clearSelStyle(); isDragging = true;
        const cell = getCell(e); if (!cell) return;
        const key = `${cell.dataset.row},${cell.dataset.col}`;
        selCells = [key];
        cell.style.background = 'rgba(139,124,248,0.4)';
        cell.style.borderColor = 'var(--pri)';
    });
    fresh.addEventListener('mousemove', e => {
        if (!isDragging) return; e.preventDefault();
        const cell = getCell(e); if (!cell) return;
        const key = `${cell.dataset.row},${cell.dataset.col}`;
        if (!selCells.includes(key)) {
            selCells.push(key);
            cell.style.background = 'rgba(139,124,248,0.4)';
            cell.style.borderColor = 'var(--pri)';
        }
    });
    fresh.addEventListener('touchstart', e => {
        e.preventDefault(); clearSelStyle(); isDragging = true;
        const cell = getCell(e); if (!cell) return;
        const key = `${cell.dataset.row},${cell.dataset.col}`;
        selCells = [key];
        cell.style.background = 'rgba(139,124,248,0.4)';
        cell.style.borderColor = 'var(--pri)';
    }, { passive: false });
    fresh.addEventListener('touchmove', e => {
        if (!isDragging) return; e.preventDefault();
        const cell = getCell(e); if (!cell) return;
        const key = `${cell.dataset.row},${cell.dataset.col}`;
        if (!selCells.includes(key)) {
            selCells.push(key);
            cell.style.background = 'rgba(139,124,248,0.4)';
            cell.style.borderColor = 'var(--pri)';
        }
    }, { passive: false });

    function onEnd() {
        if (!isDragging) return; isDragging = false;
        const found = checkWord();
        if (!found) {
            selCells.forEach(k => {
                const [r, c] = k.split(',').map(Number);
                const el = document.querySelector(`.ws-cell[data-row="${r}"][data-col="${c}"]`);
                if (el && !el.dataset.found) el.style.background = 'rgba(255,118,117,0.3)';
            });
            setTimeout(() => { clearSelStyle(); selCells = []; }, 380);
        } else { selCells = []; }
    }
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
}

    words.forEach((w, i) => {
        const chip = document.querySelector(`.ws-word[data-word="${w}"]`);
        if (!chip) return;
        if ((verbGameState.wsFoundColors || {})[`${w}_${i}`] !== undefined) {
            const col = WS_COLORS[i];
            chip.style.background = col.found;
            chip.style.borderColor = col.border;
            chip.style.color = col.foundText;
            chip.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${col.foundText};display:inline-block;"></span> ✓ ${w}`;
        }
    });

    const btn = document.getElementById('ws-continue-btn');
    if (btn) btn.disabled = !allFound;
}

function checkWordSearchComplete() {
    const words = [verbGameState.currentVerbData.verb.toUpperCase(),
    verbGameState.currentVerbData.past.toUpperCase(),
    verbGameState.currentVerbData.participle.toUpperCase()];
    const allFound = words.every(w => verbGameState.wordSearchFound.some(f => f.word === w));

    if (allFound) {
        verbGameState.completedExercises[0] = true;
        showMotivationalMessage();
        setTimeout(() => renderDragDrop(), 2000);
    }
}

function initDragDropEvents() {

    const words = document.querySelectorAll('.dd-word');

    words.forEach(word => {

        word.addEventListener('dragstart', (e) => {

            word.classList.add('dragging');

            e.dataTransfer.setData('text/plain', JSON.stringify({
                word: word.dataset.word,
                category: word.dataset.category
            }));
        });

        word.addEventListener('dragend', () => {
            word.classList.remove('dragging');
        });
    });

    document.querySelectorAll('.dd-category').forEach(cat => {

        cat.addEventListener('dragover', (e) => {
            e.preventDefault();
            cat.classList.add('active');
        });

        cat.addEventListener('dragleave', () => {
            cat.classList.remove('active');
        });

        cat.addEventListener('drop', (e) => {

            e.preventDefault();

            cat.classList.remove('active');

            const data = JSON.parse(
                e.dataTransfer.getData('text/plain')
            );

            const targetCat = cat.dataset.category;

            // En initDragDropEvents(), dentro del evento 'drop':

            const uniqueKey = `${data.word}_${targetCat}`;

            if (data.category === targetCat && !verbGameState.dragDropMatches[uniqueKey]) {
                verbGameState.dragDropMatches[uniqueKey] = targetCat;

                const draggedWord = document.querySelector(`.dd-word[data-word="${data.word}"]`);
                if (draggedWord) draggedWord.remove();

                const targetContainer = document.getElementById(`cat-${targetCat}`);
                const chip = document.createElement('div');
                chip.className = 'dd-chip';
                chip.textContent = data.word;
                targetContainer.appendChild(chip);

                playPing();
                checkDragDropComplete();
            } else {

                cat.animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-6px)' },
                    { transform: 'translateX(6px)' },
                    { transform: 'translateX(0px)' }
                ], {
                    duration: 220
                });

                toast('Incorrect category');

                playPing();
            }
        });
    });
}

function checkDragDropComplete() {
    // Crear claves únicas para cada categoría basadas en el texto de la palabra
    const verbKey = `${verbGameState.currentVerbData.verb}_verb`;
    const pastKey = `${verbGameState.currentVerbData.past}_past`;
    const participleKey = `${verbGameState.currentVerbData.participle}_participle`;

    const allMatched = verbGameState.dragDropMatches[verbKey] === 'verb' &&
        verbGameState.dragDropMatches[pastKey] === 'past' &&
        verbGameState.dragDropMatches[participleKey] === 'participle';

    if (allMatched && Object.keys(verbGameState.dragDropMatches).length === 3) {
        verbGameState.completedExercises[1] = true;
        showMotivationalMessage();
        verbGameState.writtenAnswers = [];
        verbGameState.currentWritingIndex = 0;
        setTimeout(() => renderWriting(), 2000);
    } else {
        const continueBtn = document.getElementById('dd-continue-btn');
        if (continueBtn) continueBtn.disabled = !allMatched;
    }
}

function renderWriting() {
    const exercises = [
        { id: 'verb', label: 'Verbo (Base form)', placeholder: 'Ej: break', correct: verbGameState.currentVerbData.verb },
        { id: 'past', label: 'Pasado simple (Past)', placeholder: 'Ej: broke', correct: verbGameState.currentVerbData.past },

    const currentEx = exercises[verbGameState.currentWritingIndex];

    document.getElementById('app').innerHTML = `
        <div class="screen active" id="scr-verbgame">
            <div class="hdr"><button class="back" onclick="renderMap()">←</button>
                <span style="font-size:12px;">🎮 Verb Quest · Fase 3/6 (${progress})</span>
                <button class="ico-btn" onclick="openOptions()">⚙️</button></div>
            <div class="game-body sb">
                <div class="game-card" style="padding:20px;">
                    <div style="text-align:center;margin-bottom:20px;">
                        <div class="ex-tag">✍️ FASE 3 · ESCRIBE LA FORMA CORRECTA</div>
                        <div style="font-size:22px;font-weight:800;color:var(--pri);margin-top:10px;">${verbGameState.currentVerbData.spanishWord}</div>
                    </div>
                    <div>
                        <label style="font-size:16px;font-weight:700;color:var(--text);">${currentEx.label}:</label>
                        <input type="text" id="write-answer" class="write-input" placeholder="${currentEx.placeholder}" 
                               style="width:100%;padding:14px;background:var(--card2);border:2px solid var(--border);border-radius:16px;color:var(--text);font-size:18px;margin-top:10px;text-align:center;">
                    </div>
                </div>
                <button class="btn btn-p" onclick="checkWritingAnswer()" style="margin-top:12px;">✅ Verificar</button>
            </div>
        </div>
    `;

    setTimeout(() => {
        const input = document.getElementById('write-answer');
        if (input) input.focus();
    }, 100);
}

function checkWritingAnswer() {
    const exercises = [
        { id: 'verb', correct: verbGameState.currentVerbData.verb },
        { id: 'past', correct: verbGameState.currentVerbData.past },
        { id: 'participle', correct: verbGameState.currentVerbData.participle }
    ];

    const currentEx = exercises[verbGameState.currentWritingIndex];
    const answer = document.getElementById('write-answer')?.value.trim().toLowerCase();
    const isCorrect = answer === currentEx.correct.toLowerCase();

    if (isCorrect) {
        verbGameState.writtenAnswers[verbGameState.currentWritingIndex] = answer;
        playPing();
        toast(`✅ ¡Correcto!`);

        verbGameState.currentWritingIndex++;

        if (verbGameState.currentWritingIndex >= 3) {
            verbGameState.completedExercises[2] = true;
            showMotivationalMessage();
            setTimeout(() => renderWritingExtraExercise(), 2000);
        } else {
            setTimeout(() => renderWriting(), 500);
        }
    } else {
        toast(`❌ Incorrecto. Respuesta: ${currentEx.correct}`);
        playPing();
        const input = document.getElementById('write-answer');
        if (input) {
            input.style.borderColor = 'var(--red)';
            setTimeout(() => {
                input.style.borderColor = 'var(--border)';
                input.focus();
            }, 1000);
        }
    }
}

// ════════════════════════════════════════════
// FASE 5: ORDENAR ORACIÓN (3 ejercicios)
// ════════════════════════════════════════════

let sentenceIndex = 0;
const sentenceExercises = [];

function renderSentence() {
    sentenceExercises.length = 0;
    sentenceExercises.push(
        { spanish: verbGameState.currentVerbData.verbSentenceSpanish, english: verbGameState.currentVerbData.verbSentenceEnglish },
        { spanish: verbGameState.currentVerbData.pastSentenceSpanish, english: verbGameState.currentVerbData.pastSentenceEnglish },
        { spanish: verbGameState.currentVerbData.participleSentenceSpanish, english: verbGameState.currentVerbData.participleSentenceEnglish }
    );
    sentenceIndex = 0;
    renderSentenceExercise();
}

function renderSentenceExercise() {
    const currentEx = sentenceExercises[sentenceIndex];
    const progress = `${sentenceIndex + 1}/3`;
    const sentenceEnglish = currentEx.english;
    const sentenceSpanish = currentEx.spanish;

    const words = sentenceEnglish.split(' ');
    const shuffled = [...words];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }

    verbGameState.originalWords = shuffled;
    verbGameState.sentenceOrder = [];

    let wordsHtml = shuffled.map((word, idx) => `
        <div class="sentence-word" data-word="${word}" data-idx="${idx}" 
             style="background:var(--card2);border:2px solid var(--border);border-radius:16px;padding:10px 16px;margin:6px;display:inline-block;cursor:pointer;font-weight:600;">
            ${word}
        </div>
    `).join('');

    document.getElementById('app').innerHTML = `
        <div class="screen active" id="scr-verbgame">
            <div class="hdr"><button class="back" onclick="renderMap()">←</button>
                <span style="font-size:12px;">🎮 Verb Quest · Fase 5/6 (${progress})</span>
                <button class="ico-btn" onclick="openOptions()">⚙️</button></div>
            <div class="game-body sb">
                <div class="game-card" style="padding:16px;">
                    <div style="text-align:center;margin-bottom:16px;">
                        <div class="ex-tag">📝 ORDENA LA ORACIÓN</div>
                        <div style="font-size:14px;color:var(--yellow);">🇪🇸 ${sentenceSpanish}</div>
                    </div>
                    <div style="background:var(--card);border-radius:20px;padding:20px;min-height:80px;margin-bottom:16px;">
                        <div id="sentence-area" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
                    </div>
                    <div style="background:var(--card2);border-radius:20px;padding:16px;">
                        <div id="sentence-words-container" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
                            ${wordsHtml}
                        </div>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:16px;">
                        <button class="btn btn-s" onclick="sentenceHelp()" style="flex:1;">💡 Ayuda</button>
                        <button class="btn btn-p" id="sentence-continue-btn" onclick="checkSentenceExercise()" style="flex:1;" disabled>✅ Siguiente</button>
                    </div>
                </div>
            </div>
        </div>
    `;

    initSentenceDragExercise();
}

function initSentenceDragExercise() {
    const words = document.querySelectorAll('.sentence-word');
    const sentenceArea = document.getElementById('sentence-area');

    function updateButton() {
        const btn = document.getElementById('sentence-continue-btn');
        if (btn) btn.disabled = verbGameState.sentenceOrder.length !== verbGameState.originalWords.length;
    }

    words.forEach(word => {
        const newWord = word.cloneNode(true);
        word.parentNode.replaceChild(newWord, word);

        newWord.addEventListener('click', () => {
            const wordText = newWord.dataset.word;
            verbGameState.sentenceOrder.push(wordText);
            newWord.remove();

            const chip = document.createElement('div');
            chip.textContent = wordText;
            chip.style.cssText = 'background:var(--pri);padding:10px 16px;border-radius:16px;margin:6px;display:inline-block;cursor:pointer;font-weight:600;';
            chip.onclick = () => {
                chip.remove();
                verbGameState.sentenceOrder = verbGameState.sentenceOrder.filter(w => w !== wordText);
                const container = document.getElementById('sentence-words-container');
                const newWord2 = document.createElement('div');
                newWord2.textContent = wordText;
                newWord2.className = 'sentence-word';
                newWord2.style.cssText = 'background:var(--card2);border:2px solid var(--border);border-radius:16px;padding:10px 16px;margin:6px;display:inline-block;cursor:pointer;font-weight:600;';
                newWord2.onclick = () => {
                    verbGameState.sentenceOrder.push(wordText);
                    newWord2.remove();
                    const newChip = chip.cloneNode(true);
                    newChip.onclick = () => {
                        newChip.remove();
                        verbGameState.sentenceOrder = verbGameState.sentenceOrder.filter(w => w !== wordText);
                        container.appendChild(newWord2);
                        updateButton();
                    };
                    sentenceArea.appendChild(newChip);
                    updateButton();
                };
                container.appendChild(newWord2);
                updateButton();
            };
            sentenceArea.appendChild(chip);
            updateButton();
        });
    });
}

function sentenceHelp() {
    const currentEx = sentenceExercises[sentenceIndex];
    const correctSentence = currentEx.english.split(' ');
    const currentOrder = verbGameState.sentenceOrder;

    for (let i = 0; i < correctSentence.length; i++) {
        if (currentOrder[i] !== correctSentence[i]) {
            const wordToAdd = correctSentence[i];
            if (!currentOrder.includes(wordToAdd)) {
                verbGameState.sentenceOrder.push(wordToAdd);
                const wordElement = document.querySelector(`.sentence-word[data-word="${wordToAdd}"]`);
                if (wordElement) wordElement.remove();

                const sentenceArea = document.getElementById('sentence-area');
                const chip = document.createElement('div');
                chip.textContent = wordToAdd;
                chip.style.cssText = 'background:var(--pri);padding:10px 16px;border-radius:16px;margin:6px;display:inline-block;cursor:pointer;font-weight:600;';
                sentenceArea.appendChild(chip);
                toast('💡 Una palabra colocada');
                break;
            }
        }
    }

    const btn = document.getElementById('sentence-continue-btn');
    if (btn) btn.disabled = verbGameState.sentenceOrder.length !== verbGameState.originalWords.length;
}

function checkSentenceExercise() {
    const currentEx = sentenceExercises[sentenceIndex];
    const correctSentence = currentEx.english.split(' ');
    const userSentence = verbGameState.sentenceOrder;

    const isCorrect = userSentence.length === correctSentence.length &&
        userSentence.every((word, idx) => word === correctSentence[idx]);

    if (isCorrect) {
        playPing();
        toast(`✅ ¡Oración ${sentenceIndex + 1} correcta!`);
        sentenceIndex++;

        if (sentenceIndex >= 3) {
            verbGameState.completedExercises[4] = true;
            showMotivationalMessage();
            setTimeout(() => renderComplete(), 2000);
        } else {
            setTimeout(() => renderSentenceExercise(), 500);
        }
    } else {
        toast('❌ Orden incorrecto. ¡Intenta de nuevo!');
        playPing();
        verbGameState.sentenceOrder = [];
        document.getElementById('sentence-area').innerHTML = '';
        renderSentenceExercise();
    }
}

    save();
    toast('🏆 ¡Juego completado! Has dominado este verbo');
    confetti(40);

}

}
